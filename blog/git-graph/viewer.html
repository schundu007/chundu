    <link rel="icon" type="image/svg+xml" href="/blog/git-graph/favicon.svg" />
    <title>git-graph · viewer</title>
    <!--
      Runtime data-base resolver. The compiled dashboard resolves every data file
      (knowledge-graph.json, meta.json, file-content/*, …) through its fP() helper,
      which we patched to honour window.__GG_DATA_BASE__. That makes ONE viewer able
      to render ANY project's data folder — the multi-project seam the source lacks.
        ?base=<url>       explicit data-dir (e.g. /blog/therock-graph/ or a GitPulser endpoint)
        ?project=<slug>   shorthand for /blog/git-graph/projects/<slug>/
      Must run BEFORE the module script so the value exists before the app fetches.
    -->
    <script>
      (function () {
        try {
          var q = new URLSearchParams(location.search);
          var base = q.get("base");
          var slug = q.get("project");
          if (!base && slug) base = "/blog/git-graph/projects/" + slug + "/";
          if (base) {
            if (base.slice(-1) !== "/" && base.indexOf("?") === -1) base += "/";
            window.__GG_DATA_BASE__ = base;
          }
          // Title hint so the browser tab tracks the open project.
          if (slug) document.title = "git-graph · " + slug;
        } catch (e) {}
      })();
    </script>
