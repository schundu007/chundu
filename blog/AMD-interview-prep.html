  &lt;section&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;02&lt;/span&gt;&lt;h2&gt;Workflow structure &amp;amp; conditional CI&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;Two things interviewers love to probe: the &lt;b&gt;job graph&lt;/b&gt; (how jobs fan out and depend on each other) and the &lt;b&gt;conditional logic&lt;/b&gt; (what actually runs on a PR vs a push vs a nightly).&lt;/p&gt;

    &lt;div class=&quot;diagram&quot;&gt;
      &lt;div class=&quot;cap&quot;&gt;// job graph · GitHub Actions needs()&lt;/div&gt;
      &lt;div class=&quot;dag&quot;&gt;
        &lt;div class=&quot;dcol&quot;&gt;&lt;span class=&quot;clbl&quot;&gt;configure&lt;/span&gt;&lt;div class=&quot;jbox&quot;&gt;configure_ci&lt;small&gt;generates matrix JSON&lt;/small&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;dfan&quot;&gt;⟩&lt;/div&gt;
        &lt;div class=&quot;dcol&quot;&gt;&lt;span class=&quot;clbl&quot;&gt;build · fan-out&lt;/span&gt;&lt;div class=&quot;jbox gpu&quot;&gt;build gfx942&lt;/div&gt;&lt;div class=&quot;jbox gpu&quot;&gt;build gfx1100&lt;/div&gt;&lt;div class=&quot;jbox gpu&quot;&gt;build gfx120x&lt;/div&gt;&lt;div class=&quot;jbox&quot;&gt;build · Windows&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;dfan&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;dcol&quot;&gt;&lt;span class=&quot;clbl&quot;&gt;test · per artifact&lt;/span&gt;&lt;div class=&quot;jbox gpu&quot;&gt;test gfx942&lt;/div&gt;&lt;div class=&quot;jbox gpu&quot;&gt;test gfx1100&lt;/div&gt;&lt;div class=&quot;jbox gpu&quot;&gt;test gfx120x&lt;/div&gt;&lt;div class=&quot;jbox&quot;&gt;test · Windows/WSL&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;dfan&quot;&gt;⟩&lt;/div&gt;
        &lt;div class=&quot;dcol&quot;&gt;&lt;span class=&quot;clbl&quot;&gt;gate&lt;/span&gt;&lt;div class=&quot;jbox gate&quot;&gt;report / status&lt;small&gt;needs: all tests&lt;/small&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;dfan&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;dcol&quot;&gt;&lt;span class=&quot;clbl&quot;&gt;nightly only&lt;/span&gt;&lt;div class=&quot;jbox lkg&quot;&gt;promote LKG&lt;small&gt;if all green&lt;/small&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;loopnote&quot;&gt;// each &lt;code&gt;build&lt;/code&gt; and its &lt;code&gt;test&lt;/code&gt; are an independent lane — one arch failing doesn&#x27;t block the others. The gate &lt;code&gt;needs:&lt;/code&gt; every test; LKG &lt;code&gt;needs:&lt;/code&gt; a green gate on the nightly run only.&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;diagram&quot; style=&quot;margin-top:16px&quot;&gt;
      &lt;div class=&quot;cap&quot;&gt;// conditional CI · which path a trigger takes&lt;/div&gt;
      &lt;div class=&quot;cflow&quot;&gt;
        &lt;div class=&quot;cnode ev&quot;&gt;Event&lt;/div&gt;
        &lt;div class=&quot;cbranches&quot;&gt;
          &lt;div class=&quot;cbr&quot;&gt;&lt;span class=&quot;clabel&quot;&gt;pull_request&lt;/span&gt;&lt;span class=&quot;carr&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;cstep&quot;&gt;detect changed files → affected components only&lt;/span&gt;&lt;span class=&quot;carr&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;cstep hot&quot;&gt;smoke tests · presubmit&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;cbr&quot;&gt;&lt;span class=&quot;clabel&quot;&gt;push → main&lt;/span&gt;&lt;span class=&quot;carr&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;cstep&quot;&gt;postsubmit: broader arches + more of the suite&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;cbr&quot;&gt;&lt;span class=&quot;clabel&quot;&gt;schedule (nightly)&lt;/span&gt;&lt;span class=&quot;carr&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;cstep&quot;&gt;full matrix · all arches/OS · full suite&lt;/span&gt;&lt;span class=&quot;carr&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;cstep lkg&quot;&gt;all green? promote LKG&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;cbr&quot;&gt;&lt;span class=&quot;clabel&quot;&gt;workflow_dispatch&lt;/span&gt;&lt;span class=&quot;carr&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;cstep&quot;&gt;user-selected targets / filters · repro &amp;amp; capacity&lt;/span&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;loopnote&quot;&gt;// &lt;code&gt;skip-if-docs-only&lt;/code&gt; and label opt-ins (extra arches, ROCR tests) gate individual branches. Nightly is the &lt;b&gt;only&lt;/b&gt; path that writes LKG.&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;diagram&quot; style=&quot;margin-top:16px&quot;&gt;
      &lt;div class=&quot;cap&quot;&gt;// conditional CI · what runs on each trigger (detail)&lt;/div&gt;
      &lt;div class=&quot;cond&quot;&gt;
        &lt;div class=&quot;trig presub&quot;&gt;
          &lt;div class=&quot;th&quot;&gt;&lt;div class=&quot;tn&quot;&gt;Pull request&lt;/div&gt;&lt;div class=&quot;tw&quot;&gt;presubmit · fast&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;tb&quot;&gt;
            &lt;div class=&quot;step&quot;&gt;&lt;b&gt;Detect changed files&lt;/b&gt;&lt;/div&gt;
            &lt;div class=&quot;step&quot;&gt;Map → affected projects only&lt;/div&gt;
            &lt;div class=&quot;step&quot;&gt;Build just those components&lt;/div&gt;
            &lt;div class=&quot;step&quot;&gt;&lt;b&gt;Smoke tests&lt;/b&gt; (seconds), affected arches&lt;/div&gt;
            &lt;div class=&quot;cnd&quot;&gt;skip if docs-only · labels opt-in extra arches / ROCR tests&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;trig&quot;&gt;
          &lt;div class=&quot;th&quot;&gt;&lt;div class=&quot;tn&quot;&gt;Push to main&lt;/div&gt;&lt;div class=&quot;tw&quot;&gt;postsubmit&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;tb&quot;&gt;
            &lt;div class=&quot;step&quot;&gt;Broader arch coverage&lt;/div&gt;
            &lt;div class=&quot;step&quot;&gt;More of the test suite&lt;/div&gt;
            &lt;div class=&quot;step&quot;&gt;Catches what smoke missed&lt;/div&gt;
            &lt;div class=&quot;cnd&quot;&gt;gfx120x moved presubmit→post as coverage grows&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;trig nightly&quot;&gt;
          &lt;div class=&quot;th&quot;&gt;&lt;div class=&quot;tn&quot;&gt;Nightly schedule&lt;/div&gt;&lt;div class=&quot;tw&quot;&gt;full truth&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;tb&quot;&gt;
            &lt;div class=&quot;step&quot;&gt;&lt;b&gt;Full matrix&lt;/b&gt; — all arches + OSes&lt;/div&gt;
            &lt;div class=&quot;step&quot;&gt;&lt;b&gt;Full test suite&lt;/b&gt; on real hardware&lt;/div&gt;
            &lt;div class=&quot;step&quot;&gt;Aggregate → gate&lt;/div&gt;
            &lt;div class=&quot;step&quot;&gt;&lt;b&gt;Promote LKG&lt;/b&gt; if all pass&lt;/div&gt;
            &lt;div class=&quot;cnd&quot;&gt;the only path that writes the LKG manifest&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;trig&quot;&gt;
          &lt;div class=&quot;th&quot;&gt;&lt;div class=&quot;tn&quot;&gt;Manual dispatch&lt;/div&gt;&lt;div class=&quot;tw&quot;&gt;workflow_dispatch&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;tb&quot;&gt;
            &lt;div class=&quot;step&quot;&gt;User picks targets (comma-sep list)&lt;/div&gt;
            &lt;div class=&quot;step&quot;&gt;Choose test filter / labels&lt;/div&gt;
            &lt;div class=&quot;step&quot;&gt;Ad-hoc repro &amp;amp; capacity tests&lt;/div&gt;
            &lt;div class=&quot;cnd&quot;&gt;how you debug or stress-test new hardware&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;loopnote&quot;&gt;// the through-line: &lt;b&gt;cheap signal on every PR, full truth every night.&lt;/b&gt; Every &quot;run less&quot; branch (changed-file detection, smoke, skip-docs) is paired with the nightly full run so nothing slips through.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;03&lt;/span&gt;&lt;h2&gt;Multi-arch, multi-OS &amp;amp; graph-based builds&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;Three things make this build genuinely hard — and the team is &lt;b&gt;actively moving to graph-based builds&lt;/b&gt; to tame them.&lt;/p&gt;
    &lt;div class=&quot;rows&quot; style=&quot;margin-bottom:16px&quot;&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Arch&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Multi-arch.&lt;/b&gt; One build fans out across many GPU targets — gfx942 (MI300/MI325), gfx110x / gfx120x (Radeon), and more. Some artifacts are &lt;em&gt;target-neutral&lt;/em&gt; (build once); some are per-arch. Each test routes to hardware matching its gfx target.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;N× work&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;OS&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Multi-OS.&lt;/b&gt; Linux + Windows, plus WSL (ROCm-on-WSL / rocdxg). Different runners, different packaging (manylinux vs Windows vs WSL), even dual test backends on Windows (PAL vs ROCR). You can&#x27;t assume Linux.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;forks per OS&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Graph&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Graph-based builds — the &quot;now&quot;.&lt;/b&gt; The superbuild is a DAG. A build-topology &lt;em&gt;reverse index&lt;/em&gt; maps outputs → inputs, so a change rebuilds only the affected subgraph; baseline reuse pulls unchanged artifacts from the last good run.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;active&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;diagram&quot;&gt;
      &lt;div class=&quot;cap&quot;&gt;// graph-based build · rebuild only the delta&lt;/div&gt;
      &lt;div class=&quot;flow&quot;&gt;
        &lt;div class=&quot;stage&quot;&gt;&lt;span class=&quot;st-n&quot;&gt;CHANGE&lt;/span&gt;&lt;span class=&quot;st-t&quot;&gt;A file changes&lt;/span&gt;&lt;span class=&quot;st-d&quot;&gt;on a PR&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;arr&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;stage&quot;&gt;&lt;span class=&quot;st-n&quot;&gt;REVERSE INDEX&lt;/span&gt;&lt;span class=&quot;st-t&quot;&gt;What depends on it?&lt;/span&gt;&lt;span class=&quot;st-d&quot;&gt;query the build graph&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;arr&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;stage&quot;&gt;&lt;span class=&quot;st-n&quot;&gt;SUBGRAPH&lt;/span&gt;&lt;span class=&quot;st-t&quot;&gt;Affected jobs only&lt;/span&gt;&lt;span class=&quot;st-d&quot;&gt;the rest is unchanged&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;arr&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;stage&quot;&gt;&lt;span class=&quot;st-n&quot;&gt;REUSE + BUILD&lt;/span&gt;&lt;span class=&quot;st-t&quot;&gt;Baseline for the rest&lt;/span&gt;&lt;span class=&quot;st-d&quot;&gt;rebuild only the delta&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;loopnote&quot;&gt;&lt;b&gt;why it matters:&lt;/b&gt; multi-arch × multi-OS makes a full rebuild enormous. Graph-based builds + baseline reuse keep CI cost tracking the size of the &lt;em&gt;change&lt;/em&gt;, not the size of the tree — without losing correctness.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;04&lt;/span&gt;&lt;h2&gt;Runner-fleet architecture&lt;/h2&gt;&lt;/div&gt;

  &lt;section&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;05&lt;/span&gt;&lt;h2&gt;Runners &amp;amp; registries — the mix&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;It&#x27;s &lt;b&gt;not only ARC&lt;/b&gt; — it&#x27;s a &lt;b&gt;spectrum of runner types&lt;/b&gt;, orchestrated by ARC on Kubernetes, with images flowing through &lt;b&gt;GHCR&lt;/b&gt;. Know when each one is the right call:&lt;/p&gt;
    &lt;div class=&quot;qcards&quot; style=&quot;margin-bottom:16px&quot;&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;github-hosted · managed VM&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;GitHub-hosted runners&lt;/div&gt;&lt;div class=&quot;meta&quot;&gt;Managed, ephemeral VMs GitHub provides — zero to maintain, fast to start. But &lt;b&gt;no GPUs, no internal network, no signing access.&lt;/b&gt;&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Use for:&lt;/b&gt; linting, unit tests, docs, matrix generation.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;self-hosted · cloud VM (EC2)&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;EC2 / VM runners&lt;/div&gt;&lt;div class=&quot;meta&quot;&gt;Your own cloud instances registered as self-hosted runners — &lt;b&gt;autoscale with the queue&lt;/b&gt;, IAM/OIDC access, cheap to burst. Virtualized, so no direct hardware passthrough.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Use for:&lt;/b&gt; scalable Linux/Windows &lt;em&gt;builds&lt;/em&gt; and CPU work; the AWS direction.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;self-hosted · bare-metal&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Bare-metal runners&lt;/div&gt;&lt;div class=&quot;meta&quot;&gt;Physical GPU / firmware machines — &lt;b&gt;direct device access, no virtualization overhead&lt;/b&gt;, plus NFS, signing, and internal network. Scarce and expensive.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Use for:&lt;/b&gt; firmware builds and &lt;b&gt;hardware-in-the-loop&lt;/b&gt; tests on real MI300/MI325.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;orchestrator&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;ARC on Kubernetes&lt;/div&gt;&lt;div class=&quot;meta&quot;&gt;Ties them together: turns queued jobs into &lt;b&gt;ephemeral runner pods&lt;/b&gt; that land on the right node — a cloud VM pool or a bare-metal GPU pool — and scales each with demand.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Say:&lt;/b&gt; &quot;ARC is how any of these become clean, one-job pods.&quot;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;rows&quot;&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;GHCR&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Container registry.&lt;/b&gt; GHCR holds the runner images &lt;em&gt;and&lt;/em&gt; the ROCm build/test images. Pin by digest, lean on layer caching, keep least-privilege on push.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;images&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Win&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Windows + WSL runners too.&lt;/b&gt; The stack ships on Windows, so the fleet isn&#x27;t Linux-only.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;cross-OS&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Mix&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Right tool per job.&lt;/b&gt; Push light jobs to cheap GitHub-hosted runners so the scarce GPU pool stays free for work that needs hardware.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;cost&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;06&lt;/span&gt;&lt;h2&gt;Observability — you can&#x27;t operate a fleet you can&#x27;t see&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;rows&quot;&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Queue&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Job queue depth &amp;amp; wait time.&lt;/b&gt; The signal for whether you have enough runner capacity — if jobs wait, you&#x27;re short.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;scaling&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Build&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Build times &amp;amp; cache hit rate.&lt;/b&gt; Is CI getting slower, is the cache actually helping.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;efficiency&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;GPU&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;GPU utilization, temp, memory, ECC.&lt;/b&gt; Exported by &lt;code&gt;device-metrics-exporter&lt;/code&gt; to Prometheus.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;Prometheus&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Tests&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Pass/fail and flake rate over time.&lt;/b&gt; Catch a test getting flaky before it blocks everyone.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;trends&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;HUD&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;A single dashboard (project HUD).&lt;/b&gt; Green/red across all GPU arches and pipelines at a glance — they already run one.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;Grafana/HUD&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Alert&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Retained per-job logs + alerting.&lt;/b&gt; A node throttling, a queue backing up, a nightly failing — someone gets paged.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;on-call&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;07&lt;/span&gt;&lt;h2&gt;Security — a high-trust firmware pipeline&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;The JD leans hard here. Through-line: &lt;b&gt;least privilege, nothing long-lived, prove what you shipped.&lt;/b&gt;&lt;/p&gt;
    &lt;div class=&quot;rows&quot;&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Auth&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;OIDC short-lived tokens, least-privilege IAM.&lt;/b&gt; No stored keys — a leaked log can&#x27;t hand out standing access.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;OIDC/IAM&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Ephem&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;One job per clean runner pod.&lt;/b&gt; No persistent credentials or state to steal between jobs.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;isolation&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Pin&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;SHA-pin every action and base image.&lt;/b&gt; Plus Dependabot to update deliberately — a dependency can&#x27;t change under you.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;supply chain&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Sign&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Sign artifacts; key stays in HSM/KMS off the runner.&lt;/b&gt; The runner asks the signing service — even a compromised runner has no key to steal.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;signing&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Prove&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Attach build provenance (SLSA).&lt;/b&gt; Which source, which steps — a consumer can verify the artifact came from this exact build.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;provenance&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Harden&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Runner hardening.&lt;/b&gt; Egress control (Harden-Runner), network isolation/firewall, secret scanning (gitleaks), code scanning (CodeQL), workflow linting.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;defense&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;Crown&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;The signing pipeline is the crown jewel.&lt;/b&gt; Keep it narrow, audited, human-gated — an AI agent must not sit inside a signing step.&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;critical&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;pdiv&quot;&gt;&lt;div class=&quot;pk&quot;&gt;Part II&lt;/div&gt;&lt;h2&gt;Prepare to answer&lt;/h2&gt;&lt;p&gt;What to build, what to explain, and where they&#x27;ll push hardest.&lt;/p&gt;&lt;/section&gt;

  &lt;section&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;08&lt;/span&gt;&lt;h2&gt;Coding questions to rehearse&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;Infra coding is &lt;b&gt;string / graph / process wrangling in Python and Bash&lt;/b&gt;, with tests. Write these cleanly, with edge cases and a unit test.&lt;/p&gt;
    &lt;div class=&quot;qcards&quot;&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;selective builds&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Map changed files → components → test set.&lt;/div&gt;&lt;div class=&quot;meta&quot;&gt;Given changed paths and a project→paths map, return which projects to build and which tests to run. Handle &quot;only CI scripts → skip library tests.&quot;&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Say:&lt;/b&gt; &quot;this is how CI only does the delta.&quot;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;matrix generator&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Generate a build matrix as JSON from config.&lt;/div&gt;&lt;div class=&quot;meta&quot;&gt;GPU × OS × Python, with &lt;code&gt;include&lt;/code&gt;/&lt;code&gt;exclude&lt;/code&gt; rules, emitted for &lt;code&gt;fromJSON()&lt;/code&gt;. Add a unit test.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Say:&lt;/b&gt; &quot;YAML is the output; Python is the build system.&quot;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;retry logic&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Retry a flaky command with backoff.&lt;/div&gt;&lt;div class=&quot;meta&quot;&gt;Retry on &lt;b&gt;infra&lt;/b&gt; errors, not on a real test failure. Cap attempts; exponential backoff; clear final exit code.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Watch for:&lt;/b&gt; distinguishing error classes — the whole point.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;runner health&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;GPU node health check.&lt;/div&gt;&lt;div class=&quot;meta&quot;&gt;Read device metrics (temp, mem, ECC); decide healthy / drain / fail. Output a decision a scheduler can act on.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Say:&lt;/b&gt; &quot;pull a throttling node before it fails a job and looks flaky.&quot;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;log parsing&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Parse test output → summary + exit code.&lt;/div&gt;&lt;div class=&quot;meta&quot;&gt;Count pass/fail/skip, handle a truncated log or timeout, exit non-zero on any real failure.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Edge cases:&lt;/b&gt; partial logs, timeout, &quot;0 tests ran&quot; (fail, not pass).&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;build graph&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Reverse index: what to rebuild for a change.&lt;/div&gt;&lt;div class=&quot;meta&quot;&gt;Given outputs→inputs edges, compute the minimal set of jobs to rebuild when a file changes.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Say:&lt;/b&gt; &quot;reuse the last good baseline, rebuild only the delta.&quot;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;LKG promotion&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Promote the Last Known Good manifest.&lt;/div&gt;&lt;div class=&quot;meta&quot;&gt;If &lt;b&gt;all&lt;/b&gt; pass write the new version set; otherwise leave the previous one untouched.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Invariant:&lt;/b&gt; never write a partially-passing set. Atomic.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;cleanup / bash&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Release leaked GPU resources after a job.&lt;/div&gt;&lt;div class=&quot;meta&quot;&gt;Clean up stray processes / GPU allocations even on failure (trap/finally). Idempotent.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Say:&lt;/b&gt; &quot;runs on every exit path, so the next job starts clean.&quot;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;09&lt;/span&gt;&lt;h2&gt;System-design questions&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;Structure each: &lt;b&gt;requirements → the pieces → the flow → the failure modes → the trade-offs.&lt;/b&gt; Draw the diagrams above from memory.&lt;/p&gt;
    &lt;div class=&quot;qcards&quot;&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;the core one&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Design the nightly CI for the full GPU stack, producing an LKG.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Cover:&lt;/b&gt; matrix generation, build-once/test-many, HITL, aggregation, one-directional LKG promotion, and what happens when one arch fails.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;runners&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Design self-hosted GitHub runners on Kubernetes, with GPUs and firmware constraints.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Cover:&lt;/b&gt; ARC + ephemeral pods, GPU node pools, NFS, signing access, dind-as-sidecar, autoscaling, provisioning as code.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;hardware&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Design HITL test routing across GPU products with scarce, flaky hardware.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Cover:&lt;/b&gt; labeling by arch, queueing, health checks + auto-drain, hardware-vs-test failure, capacity backpressure.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;cross-repo&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Design CI where component repos reuse the superproject&#x27;s workflows.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Cover:&lt;/b&gt; one matrix source of truth, reusable workflows with inputs, a &quot;which repo am I&quot; step, small reversible rollout.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;cloud migration&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Migrate runners from AKS to AWS/EKS with minimal disruption.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Cover:&lt;/b&gt; IAM/OIDC not keys, EC2 GPU node pools, run both in parallel and shift load, Terraform, Azure-specific vs portable.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;qc&quot;&gt;&lt;span class=&quot;tag&quot;&gt;supply chain&lt;/span&gt;&lt;div class=&quot;qt&quot;&gt;Design a release you can prove wasn&#x27;t tampered with.&lt;/div&gt;&lt;div class=&quot;hint&quot;&gt;&lt;b&gt;Cover:&lt;/b&gt; sign artifacts, attach provenance, pin dependencies by hash, keep the signing key in a service/HSM off the runner.&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;10&lt;/span&gt;&lt;h2&gt;Read-and-explain drills&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;Interviewers increasingly hand you a command or a file and ask &quot;what does this do, and what&#x27;s wrong with it?&quot; Rehearse these.&lt;/p&gt;
    &lt;div class=&quot;drill&quot;&gt;
      &lt;div class=&quot;dh&quot;&gt;&amp;#9312; CMake &amp;mdash; what does it do, any issues?&lt;/div&gt;
      &lt;pre&gt;cmake -B build \
  -DTHEROCK_AMDGPU_FAMILIES=gfx942 \
  -DCMAKE_BUILD_TYPE=Release \
  -Drocblas_BUILD_TYPE=RelWithDebInfo&lt;/pre&gt;
      &lt;div class=&quot;find&quot;&gt;&lt;b&gt;Explain:&lt;/b&gt; configures the superbuild for gfx942, Release overall but rocBLAS with debug info. &lt;b&gt;Issues:&lt;/b&gt; no &lt;code&gt;-GNinja&lt;/code&gt; &amp;rarr; falls back to Make (much slower); a per-component build-type only helps if that component is actually built; gfx942 alone means no other arches. &lt;span class=&quot;ok&quot;&gt;Say: &quot;add -GNinja and confirm the family list matches the target hardware.&quot;&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;drill&quot;&gt;
      &lt;div class=&quot;dh&quot;&gt;&amp;#9313; Dockerfile &amp;mdash; spot the issues&lt;/div&gt;
      &lt;pre&gt;FROM ubuntu:latest
RUN apt-get update &amp;&amp; apt-get install -y python3 git
ADD . /app
RUN pip install -r requirements.txt
USER root
CMD [&quot;python3&quot;, &quot;app.py&quot;]&lt;/pre&gt;
      &lt;div class=&quot;find&quot;&gt;&lt;b&gt;Issues:&lt;/b&gt; &lt;code&gt;latest&lt;/code&gt; is unpinned (pin a digest); no &lt;code&gt;--no-install-recommends&lt;/code&gt; / no apt cleanup (bloat); &lt;code&gt;ADD .&lt;/code&gt; should be &lt;code&gt;COPY&lt;/code&gt; and it busts cache every change (copy requirements first); runs as &lt;code&gt;root&lt;/code&gt;; pip deps unpinned. &lt;span class=&quot;ok&quot;&gt;Say: &quot;pin the base, COPY deps first for caching, drop root, clean apt.&quot;&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;drill&quot;&gt;
      &lt;div class=&quot;dh&quot;&gt;&amp;#9314; GitHub Actions YAML &amp;mdash; spot the issues&lt;/div&gt;
      &lt;pre&gt;on: pull_request_target
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with: { ref: ${{ github.event.pull_request.head.sha }} }
      - run: ./build.sh ${{ github.event.pull_request.title }}
        env: { TOKEN: ${{ secrets.DEPLOY_TOKEN }} }&lt;/pre&gt;
      &lt;div class=&quot;find&quot;&gt;&lt;b&gt;Issues:&lt;/b&gt; &lt;code&gt;pull_request_target&lt;/code&gt; + checking out PR head + a secret = &lt;b&gt;token-exfiltration&lt;/b&gt; risk (untrusted code runs with secrets); &lt;code&gt;@main&lt;/code&gt; is unpinned (pin by SHA); interpolating &lt;code&gt;pull_request.title&lt;/code&gt; into &lt;code&gt;run&lt;/code&gt; = &lt;b&gt;script injection&lt;/b&gt;; no &lt;code&gt;timeout-minutes&lt;/code&gt;, no &lt;code&gt;concurrency&lt;/code&gt;, no least-privilege &lt;code&gt;permissions:&lt;/code&gt;. &lt;span class=&quot;ok&quot;&gt;Say: &quot;use pull_request for untrusted PRs, never interpolate untrusted input into run, pin actions by SHA, scope permissions.&quot;&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;11&lt;/span&gt;&lt;h2&gt;Commands from the repo, explained&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;The real commands TheRock&#x27;s build &amp;amp; CI actually run — know what each does and its gotchas.&lt;/p&gt;
    &lt;div class=&quot;cmds&quot;&gt;
      &lt;div class=&quot;cmd&quot;&gt;&lt;code&gt;python3 ./build_tools/fetch_sources.py&lt;/code&gt;&lt;div class=&quot;x&quot;&gt;&lt;b&gt;Clone all submodules and re-apply patches.&lt;/b&gt; Resets every submodule to its pinned ref — destructive, commit first. Step 0 before any build.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;cmd&quot;&gt;&lt;code&gt;cmake -B build -GNinja -DTHEROCK_AMDGPU_FAMILIES=gfx942&lt;/code&gt;&lt;div class=&quot;x&quot;&gt;&lt;b&gt;Configure the CMake superbuild&lt;/b&gt; for a GPU family with the Ninja generator. Miss &lt;code&gt;-GNinja&lt;/code&gt; → falls back to Make (slower); miss the family → builds nothing useful.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;cmd&quot;&gt;&lt;code&gt;ninja -C build&lt;/code&gt;&lt;div class=&quot;x&quot;&gt;&lt;b&gt;Build everything&lt;/b&gt; → &lt;code&gt;build/dist/rocm/&lt;/code&gt;. &lt;code&gt;-C build&lt;/code&gt; points Ninja at the build tree.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;cmd&quot;&gt;&lt;code&gt;ninja -C build rocblas+build   # or +expunge / +dist&lt;/code&gt;&lt;div class=&quot;x&quot;&gt;&lt;b&gt;Per-component targets.&lt;/b&gt; &lt;code&gt;+build&lt;/code&gt; rebuilds one component after edits; &lt;code&gt;+expunge&lt;/code&gt; cleans it; &lt;code&gt;+dist&lt;/code&gt; refreshes artifacts without a full rebuild.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;cmd&quot;&gt;&lt;code&gt;eval &quot;$(./build_tools/setup_ccache.py)&quot;&lt;/code&gt;&lt;div class=&quot;x&quot;&gt;Sets ccache env; then configure with &lt;code&gt;-DCMAKE_C_COMPILER_LAUNCHER=ccache&lt;/code&gt; for cached rebuilds.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;cmd&quot;&gt;&lt;code&gt;ctest --test-dir build -L quick -L ex_gpu_gfx110X&lt;/code&gt;&lt;div class=&quot;x&quot;&gt;&lt;b&gt;Run tests&lt;/b&gt; from the build tree, filtered by labels (&lt;code&gt;-L&lt;/code&gt;) — a quick subset for one GPU arch.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;cmd&quot;&gt;&lt;code&gt;docker buildx build --file dockerfiles/build_manylinux_x86_64.Dockerfile dockerfiles/&lt;/code&gt;&lt;div class=&quot;x&quot;&gt;Builds the &lt;b&gt;manylinux CI image&lt;/b&gt; (the reproducible build environment) with BuildKit.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;cmd&quot;&gt;&lt;code&gt;python build_tools/github_actions/configure_multi_arch_ci.py&lt;/code&gt;&lt;div class=&quot;x&quot;&gt;&lt;b&gt;Generates the CI build matrix&lt;/b&gt; as JSON — the Python layer GitHub Actions consumes via &lt;code&gt;fromJSON()&lt;/code&gt;.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;cmd&quot;&gt;&lt;code&gt;python build_tools/fetch_artifacts.py&lt;/code&gt;&lt;div class=&quot;x&quot;&gt;Pulls &lt;b&gt;prebuilt artifacts&lt;/b&gt; instead of building from source — the baseline-reuse shortcut.&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;12&lt;/span&gt;&lt;h2&gt;Pain points they&#x27;ll press on&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;The hard, real problems. For each: what makes it hard, and the plain answer that lands.&lt;/p&gt;
    &lt;div class=&quot;pp&quot;&gt;
      &lt;div class=&quot;pain&quot;&gt;&lt;span class=&quot;who&quot;&gt;Geo · Sai&lt;/span&gt;&lt;h4&gt;Flaky tests vs. a real failure — on shared, scarce hardware&lt;/h4&gt;&lt;p&gt;A GPU test fails 1-in-20. Bug, bad node, or contention? Getting it wrong hides regressions or wastes scarce hardware.&lt;/p&gt;&lt;p class=&quot;ans&quot;&gt;&lt;b&gt;Answer:&lt;/b&gt; retry once in isolation to diagnose; if it passes it&#x27;s likely flaky. Track flake rate, quarantine the bad ones, fix the root cause. Pull unhealthy nodes automatically so hardware issues don&#x27;t masquerade as flakes.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pain&quot;&gt;&lt;span class=&quot;who&quot;&gt;Sai&lt;/span&gt;&lt;h4&gt;Runners wedge — memory pressure and GPUs not released&lt;/h4&gt;&lt;p&gt;A job OOMs the box or leaves a GPU allocated; the next job on that shared machine fails for no reason.&lt;/p&gt;&lt;p class=&quot;ans&quot;&gt;&lt;b&gt;Answer:&lt;/b&gt; ephemeral pods (clean machine per job), a memory watch that catches a job before it crashes the node, and a cleanup step that releases the GPU on every exit path — even failure.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pain&quot;&gt;&lt;span class=&quot;who&quot;&gt;Sai · Joseph&lt;/span&gt;&lt;h4&gt;Build caching helps less than expected on GPU code&lt;/h4&gt;&lt;p&gt;ccache/sccache miss a lot on device code because of multi-architecture offload, so people over-promise a hit rate.&lt;/p&gt;&lt;p class=&quot;ans&quot;&gt;&lt;b&gt;Answer:&lt;/b&gt; make builds repeatable first (pin compiler, stable flags, no absolute paths), use a shared remote cache — and &lt;b&gt;measure the real hit rate on device code before quoting a number.&lt;/b&gt;&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pain&quot;&gt;&lt;span class=&quot;who&quot;&gt;Sai&lt;/span&gt;&lt;h4&gt;Capacity — MI300/MI325 are scarce and expensive&lt;/h4&gt;&lt;p&gt;Too few GPU runners and the queue backs up; too many and you burn money on idle silicon.&lt;/p&gt;&lt;p class=&quot;ans&quot;&gt;&lt;b&gt;Answer:&lt;/b&gt; scale the pool with the queue (ARC), stress-test new capacity before relying on it, watch queue-wait as the signal. Smoke-on-PR + full-nightly keeps most work off the scarce hardware.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pain&quot;&gt;&lt;span class=&quot;who&quot;&gt;Joseph&lt;/span&gt;&lt;h4&gt;Multi-repo change ordering&lt;/h4&gt;&lt;p&gt;Switching CI to a new location before the submodule refs are bumped breaks everything.&lt;/p&gt;&lt;p class=&quot;ans&quot;&gt;&lt;b&gt;Answer:&lt;/b&gt; write the sequence down, gate each step on the one before it, land in small reversible pieces, revert-first if a landed change draws a real concern.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pain&quot;&gt;&lt;span class=&quot;who&quot;&gt;Sai&lt;/span&gt;&lt;h4&gt;ROCm image / version sync across frameworks&lt;/h4&gt;&lt;p&gt;PyTorch, SGLang, and the stack each expect a ROCm version; they drift, and a bump breaks one while fixing another.&lt;/p&gt;&lt;p class=&quot;ans&quot;&gt;&lt;b&gt;Answer:&lt;/b&gt; pin the ROCm image explicitly per pipeline, upgrade deliberately behind a test gate, keep the image build cached so a bump isn&#x27;t a 40-minute rebuild.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pain&quot;&gt;&lt;span class=&quot;who&quot;&gt;the JD&lt;/span&gt;&lt;h4&gt;Firmware constraints need IT — NFS, signing, firewall&lt;/h4&gt;&lt;p&gt;You can&#x27;t just spin a cloud runner; the build needs internal access, and that means other teams.&lt;/p&gt;&lt;p class=&quot;ans&quot;&gt;&lt;b&gt;Answer:&lt;/b&gt; go to IT with a tight, specific ask (this host, this port, this share read-only, this signing endpoint) and the security boundary spelled out; bring them in early as design partners.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pain&quot;&gt;&lt;span class=&quot;who&quot;&gt;all three&lt;/span&gt;&lt;h4&gt;Don&#x27;t skip work blindly&lt;/h4&gt;&lt;p&gt;Every &quot;run less&quot; idea risks missing a regression — they&#x27;ll push on exactly that.&lt;/p&gt;&lt;p class=&quot;ans&quot;&gt;&lt;b&gt;Answer:&lt;/b&gt; pair every skip with how you stay safe — nightly full runs, coverage gates, changed-dependency analysis. Fast feedback on PRs, full truth every night.&lt;/p&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section style=&quot;border-bottom:none&quot;&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;APX&lt;/span&gt;&lt;h2&gt;Appendix — full CI component &amp;amp; process map&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;A reference inventory — the components and processes a complete GPU-stack CI actually touches, grouped by lifecycle phase. If they ask &quot;what does your CI include?&quot;, this is the checklist.&lt;/p&gt;
    &lt;div class=&quot;compmap&quot;&gt;
      &lt;div class=&quot;cm&quot;&gt;&lt;div class=&quot;cmh&quot;&gt;01 · Source &amp;amp; dependencies&lt;/div&gt;&lt;ul&gt;
        &lt;li&gt;Submodule management (&lt;code&gt;fetch_sources.py&lt;/code&gt;, pinned refs)&lt;/li&gt;
        &lt;li&gt;Patch management — apply/maintain patches on submodules&lt;/li&gt;
        &lt;li&gt;Dependency bumps — Dependabot, scheduled submodule updates&lt;/li&gt;
        &lt;li&gt;Version pinning — SHA-pinned actions, ROCm image tags&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;cm&quot;&gt;&lt;div class=&quot;cmh&quot;&gt;02 · Pre-flight checks&lt;/div&gt;&lt;ul&gt;
        &lt;li&gt;Pre-commit hooks (run on staged files)&lt;/li&gt;
        &lt;li&gt;Format / lint — Black, clang-format, mdformat, actionlint&lt;/li&gt;
        &lt;li&gt;Static analysis — CodeQL; secret scanning — gitleaks&lt;/li&gt;
        &lt;li&gt;Changed-file detection &amp;amp; PR label parsing&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;cm&quot;&gt;&lt;div class=&quot;cmh&quot;&gt;03 · Configure&lt;/div&gt;&lt;ul&gt;
        &lt;li&gt;Matrix generation — Python → JSON via &lt;code&gt;fromJSON()&lt;/code&gt;&lt;/li&gt;
        &lt;li&gt;Reusable workflows + external-repo detection&lt;/li&gt;
        &lt;li&gt;Build-topology graph / reverse index (selective builds)&lt;/li&gt;
        &lt;li&gt;Baseline run selection (reuse last good)&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;cm&quot;&gt;&lt;div class=&quot;cmh&quot;&gt;04 · Build&lt;/div&gt;&lt;ul&gt;
        &lt;li&gt;CMake superbuild — phases: configure → build → stage → dist&lt;/li&gt;
        &lt;li&gt;Ninja; compiler toolchain (LLVM/Clang, device libs)&lt;/li&gt;
        &lt;li&gt;Caching — &lt;code&gt;ccache&lt;/code&gt;/&lt;code&gt;sccache&lt;/code&gt; + remote cache + docker layers&lt;/li&gt;
        &lt;li&gt;Container image build — manylinux &amp;amp; ROCm images → GHCR&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;cm&quot;&gt;&lt;div class=&quot;cmh&quot;&gt;05 · Package &amp;amp; artifacts&lt;/div&gt;&lt;ul&gt;
        &lt;li&gt;Per-component packaging (&lt;code&gt;dist/&lt;/code&gt;), unified rocm tree&lt;/li&gt;
        &lt;li&gt;Python wheels (manylinux), tarball archives, index pages&lt;/li&gt;
        &lt;li&gt;Artifact store (S3) + retention; artifact manifests&lt;/li&gt;
        &lt;li&gt;Signing + SLSA provenance + SBOM&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;cm&quot;&gt;&lt;div class=&quot;cmh&quot;&gt;06 · Test&lt;/div&gt;&lt;ul&gt;
        &lt;li&gt;Tiers — sanity/smoke → component → full suite&lt;/li&gt;
        &lt;li&gt;Test categories / filters / labels; sharding &amp;amp; parallelism&lt;/li&gt;
        &lt;li&gt;Hardware-in-the-loop routing (label by gfx target)&lt;/li&gt;
        &lt;li&gt;Retries &amp;amp; flaky handling; reproduction scripts&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;cm&quot;&gt;&lt;div class=&quot;cmh&quot;&gt;07 · Gate &amp;amp; merge&lt;/div&gt;&lt;ul&gt;
        &lt;li&gt;Required status checks / branch protection&lt;/li&gt;
        &lt;li&gt;CODEOWNERS review routing&lt;/li&gt;
        &lt;li&gt;PR status reporting; presubmit vs postsubmit&lt;/li&gt;
        &lt;li&gt;Revert-first discipline / trunk health (merge queue if used)&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;cm&quot;&gt;&lt;div class=&quot;cmh&quot;&gt;08 · Release&lt;/div&gt;&lt;ul&gt;
        &lt;li&gt;Nightly integration build (full stack)&lt;/li&gt;
        &lt;li&gt;LKG manifest promotion (one-directional)&lt;/li&gt;
        &lt;li&gt;Release-staging branches, versioning&lt;/li&gt;
        &lt;li&gt;Copy-to-release buckets; customer-ready bundle&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;cm&quot;&gt;&lt;div class=&quot;cmh&quot;&gt;09 · Cross-repo sync&lt;/div&gt;&lt;ul&gt;
        &lt;li&gt;Reusable workflows shared across super-repos&lt;/li&gt;
        &lt;li&gt;Patch-back / merge-sync (monorepo ↔ downstream)&lt;/li&gt;
        &lt;li&gt;Submodule ref bumps into the superproject&lt;/li&gt;
        &lt;li&gt;Squash / rebase / empty-diff handling&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;cm&quot;&gt;&lt;div class=&quot;cmh&quot;&gt;10 · Fleet &amp;amp; ops&lt;/div&gt;&lt;ul&gt;
        &lt;li&gt;Runner provisioning — ARC, bare-metal, EC2/VM&lt;/li&gt;
        &lt;li&gt;Autoscaling / capacity &amp;amp; queue backpressure&lt;/li&gt;
        &lt;li&gt;Fleet health &amp;amp; metrics — device-metrics → Prometheus → HUD&lt;/li&gt;
        &lt;li&gt;Interactive dev access (SSH to pods); on-call, cost&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;header class=&quot;hero&quot;&gt;
    &lt;p class=&quot;eyebrow&quot;&gt;Interview Prep · Q&amp;amp;A&lt;/p&gt;
    &lt;h1&gt;The questions — and what to say back&lt;/h1&gt;
    &lt;p class=&quot;lede&quot;&gt;Two parts: &lt;b&gt;role-specific&lt;/b&gt; (the things unique to this AMD CI job) and &lt;b&gt;general CI/build/test&lt;/b&gt;. Say the answers in your own words, and swap in real numbers from your own work wherever you can.&lt;/p&gt;
  &lt;/header&gt;
&lt;/div&gt;

&lt;div class=&quot;subnav&quot;&gt;&lt;div class=&quot;wrap&quot;&gt;&lt;span class=&quot;k&quot;&gt;Jump to&lt;/span&gt;
  &lt;a href=&quot;#partA&quot;&gt;① Role-specific (JD)&lt;/a&gt;
  &lt;a href=&quot;#partB&quot;&gt;② General CI / build / test&lt;/a&gt;
  &lt;a href=&quot;#setup&quot;&gt;③ Your current setup&lt;/a&gt;
&lt;/div&gt;&lt;/div&gt;

&lt;div class=&quot;wrap&quot;&gt;

  &lt;section id=&quot;partA&quot;&gt;
    &lt;div class=&quot;part&quot;&gt;Part ① · Role-specific&lt;/div&gt;
    &lt;h2&gt;The AMD CI job&#x27;s own questions&lt;/h2&gt;
    &lt;p class=&quot;sub&quot;&gt;Standing up nightly CI for the full GPU stack, self-hosted runners under firmware constraints, an LKG baseline, an AWS direction. These decide it.&lt;/p&gt;
    &lt;div class=&quot;qa&quot;&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;What is a Last Known Good (LKG) manifest, and how do you promote to it?&lt;span class=&quot;badge&quot;&gt;named priority&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;It&#x27;s the exact set of versions that were tested together and all passed.&lt;/span&gt; Firmware, driver, and ROCm each move on their own; the LKG records one combination built and validated as a whole, so everyone has a trusted baseline instead of guessing which mix works. Promotion is automatic and one-directional: the nightly assembles the full stack and runs the suite; only if everything passes do those versions become the new LKG. A failed nightly keeps LKG on yesterday&#x27;s good set — it never points at a broken combination.&lt;/div&gt;
        &lt;div class=&quot;why&quot;&gt;The JD names LKG twice. Stress &quot;only a full pass promotes it.&quot;&lt;/div&gt;&lt;/div&gt;

      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;Cloud runners can&#x27;t build firmware. How do you stand up a self-hosted runner that can?&lt;span class=&quot;badge&quot;&gt;#1 / #2 priority&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Provision your own machines and give them exactly what firmware builds need.&lt;/span&gt; Cloud runners lack three things: host tools over NFS, the code-signing service, and the internal network. So I bring up our own machines as self-hosted runners and set up NFS mounts, credentials to reach the signing service (the key stays in the service, never on the runner), and firewall rules that allow exactly what&#x27;s needed. All &lt;b&gt;as code&lt;/b&gt; so a new runner comes up identical, and ephemeral where I can — one job per clean machine, no drift.&lt;/div&gt;
        &lt;div class=&quot;why&quot;&gt;Your thinnest area — practice until smooth. Key words: &quot;as code,&quot; &quot;least access,&quot; &quot;key stays in the service,&quot; &quot;ephemeral.&quot;&lt;/div&gt;&lt;/div&gt;

      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;The CI is moving toward AWS. How would you set the runners up there?&lt;span class=&quot;badge&quot;&gt;strong plus&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;EC2 runners that register themselves and scale with the queue, defined in Terraform.&lt;/span&gt; Instances register as self-hosted runners on boot; the pool scales with the job queue so you&#x27;re not paying for idle machines. Access via IAM roles, not stored keys — the instance assumes a role for short-lived credentials. Private subnet, tight security group. Terraform for repeatability, consistent with where the broader GPU-stack CI is heading so nothing has to be rebuilt later.&lt;/div&gt;
        &lt;div class=&quot;why&quot;&gt;JD wants &quot;consistent with the AWS direction from the start&quot; — say that back.&lt;/div&gt;&lt;/div&gt;

      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;How do you bring real GPU hardware into the test pipeline?&lt;span class=&quot;badge&quot;&gt;strong plus&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Build anywhere, but test on machines with real cards, labeled by GPU.&lt;/span&gt; The build runs on any runner; tests run on actual AMD GPUs. So I keep a pool of machines with real Instinct/Radeon cards, each labeled by type and registered as a test runner. Build once, hand the package to the hardware runners, run on real silicon, report back. Hard parts: keeping scarce machines healthy, routing each test to a card that can run it, and making a hardware failure look like one — not a flaky test.&lt;/div&gt;&lt;/div&gt;

      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;So much of this needs IT — NFS, firewall, signing access. How do you work with them?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Go in with a specific, tightly-scoped ask, and treat IT as a design partner.&lt;/span&gt; Not &quot;I need access&quot; but the exact list: this host, this port, this NFS share read-only, this signing endpoint — and the smallest permission that does it, with the security boundary named. Bring them in early, ask their constraints, adjust the design — rather than a ticket at the end. Getting things done across teams is half this job.&lt;/div&gt;
        &lt;div class=&quot;why&quot;&gt;The JD calls this out twice — a crisp people-answer is a differentiator.&lt;/div&gt;&lt;/div&gt;

      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;How do you use AI coding tools in real infrastructure work?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Daily, as a multiplier — draft fast, review everything, keep the judgment.&lt;/span&gt; Drafting runner-provisioning scripts, workflow templates, and glue quickly, then reviewing every line before it ships. The skill is breaking a task into pieces an agent does well, checking output, catching where it&#x27;s wrong. A concrete example: I used an AI agent to pull and analyze the actual ROCm/TheRock CI from the public repo and turn it into a clear picture faster than by hand, while keeping my own judgment on what&#x27;s correct.&lt;/div&gt;
        &lt;div class=&quot;why&quot;&gt;Your strongest &quot;strong plus&quot; — have one real, specific example ready.&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;partB&quot;&gt;
    &lt;div class=&quot;part&quot;&gt;Part ② · General&lt;/div&gt;
    &lt;h2&gt;CI / build / test — the common questions&lt;/h2&gt;
    &lt;p class=&quot;sub&quot;&gt;The bread-and-butter every interviewer checks. Plain answers; drop in your own numbers.&lt;/p&gt;

    &lt;h3 class=&quot;grp&quot;&gt;Pipeline &amp;amp; test execution&lt;/h3&gt;
    &lt;div class=&quot;qa&quot;&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;How do you set up build and test jobs so one failure doesn&#x27;t block everything?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Give each target its own lane.&lt;/span&gt; Not &quot;all builds finish, then all tests run.&quot; Each GPU target builds and tests independently, so one arch&#x27;s build breaking doesn&#x27;t stop the others — you still get results from every other target.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;A full test suite is too slow to run on every PR. What do you actually run?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;A little on every PR, the rest by need.&lt;/span&gt; A small smoke set catches obvious breakage in seconds; run more based on what changed; the whole suite runs nightly and before release. Fast feedback on PRs, full coverage every night. Any &quot;run less&quot; is paired with the nightly full run.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;How do you tell a flaky test from a real failure?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Retry once to diagnose, then track it — don&#x27;t hide it.&lt;/span&gt; Re-run in isolation; if it passes it&#x27;s likely flaky. Log it, tag it, watch the flake rate; quarantine the bad ones (non-blocking) and fix the root cause — usually timing, order, or a shared resource.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;A test passes locally but fails only in CI. How do you debug it?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Make CI easy to reproduce, then compare.&lt;/span&gt; Most &quot;only in CI&quot; failures are an environment difference — image, dependency version, GPU. Pin those, add a script that runs the CI steps locally, pull logs and memory/GPU usage from the failed run. Often it&#x27;s memory pressure or a leftover resource from a prior job on a shared machine.&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;h3 class=&quot;grp&quot;&gt;CI structure &amp;amp; change management&lt;/h3&gt;
    &lt;div class=&quot;qa&quot;&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;How would you cut duplicated CI across several repos?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Write the CI once and let the other repos call it.&lt;/span&gt; Reusable workflows: one repo owns the logic; others call it with a few inputs. One thing to fix instead of three copies drifting apart.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;A bad change lands on main. Revert or fix forward?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Revert first, almost always.&lt;/span&gt; Getting main green is the priority; a revert is fast and safe. Fix properly on a branch and bring it back. Only fix forward if it&#x27;s tiny and obvious. Reverting protects everyone building on main.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;You&#x27;ve got a big change to land. How do you do it safely?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Cut it into small pieces that each stand alone.&lt;/span&gt; Five small PRs review well; one 2,000-line PR doesn&#x27;t. Land the safe, tested parts first, riskier wiring last. If a reviewer raises a real concern after merge, revert first and talk it through.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;How do you handle a change that touches several repos at once?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Work out the order first, and gate each step.&lt;/span&gt; Prepare and merge downstream, bump the versions the main repo points to, then flip the switch. Flip too early and it breaks — write the order down, don&#x27;t start a step until the prior one is done.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;What does a good CI pull request look like to you?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Small, tested, and easy to reason about.&lt;/span&gt; Does one thing, small enough to review, ships with a test, says so if it changes shared behavior, easy to revert. Five focused PRs beat one giant one.&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;h3 class=&quot;grp&quot;&gt;Speed, security &amp;amp; supply chain&lt;/h3&gt;
    &lt;div class=&quot;qa&quot;&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;Build caching — why does it often help less than expected?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;It reuses old compile results, but only if nothing looks different.&lt;/span&gt; ccache/sccache only hit on identical inputs — same compiler, flags, paths. A changed flag or path counts as new. So make builds repeatable (pin compiler, stable flags, no absolute paths); a shared cache means fresh machines start warm. Honest caveat: GPU/device code caches worse than host C++ (multi-arch offload), so measure the real hit rate before quoting a number.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;How do you handle credentials in CI?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Avoid long-lived keys; use short-lived tokens.&lt;/span&gt; The job proves who it is (OIDC) and gets a temporary credential just for that run. Nothing long-lived to leak, less to rotate, a leaked log can&#x27;t hand out standing access.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;How do you make sure you ship what you built?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Sign it, and record how it was made.&lt;/span&gt; Sign the built files so anyone can verify origin; attach build provenance (which source, which steps); pin dependencies by hash so nothing changes under you. For firmware, the key lives in an HSM/KMS off the runner.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q&lt;/span&gt;&lt;span&gt;How do you get build outputs to the test jobs?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Build once, then hand the same package to every test job.&lt;/span&gt; The build uploads a named artifact; each test downloads that exact package and runs against it — nothing rebuilt. Keeps builds and tests independent, and every test ran against the same bytes.&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;setup&quot; style=&quot;border-bottom:none&quot;&gt;
    &lt;div class=&quot;part&quot;&gt;Part ③ · Your current setup&lt;/div&gt;
    &lt;h2&gt;&quot;Walk me through your current CI&quot;&lt;/h2&gt;
    &lt;div class=&quot;own&quot;&gt;
      &lt;h4&gt;&quot;What&#x27;s the biggest problem, and what did you do about it?&quot;&lt;/h4&gt;
      &lt;p&gt;They test how you diagnose, not whether things are perfect. Pick &lt;b&gt;one real problem&lt;/b&gt; and tell it in four beats: what was wrong → why → what you tried → the number it moved. Be ready to go three questions deeper on that one thing.&lt;/p&gt;
