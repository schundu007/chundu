<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<title>AMD Interview Prep — All-in-one</title>
<style>
  html,body{margin:0;height:100%;background:#07090C;font-family:"IBM Plex Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  body{display:flex;flex-direction:column}
  .bar{flex:none;height:52px;display:flex;align-items:center;gap:6px;padding:0 12px;background:#0D1218;border-bottom:1px solid #1D2831;z-index:10;overflow-x:auto}
  .brand{font-family:"IBM Plex Mono",ui-monospace,Menlo,monospace;font-size:12px;color:#6B8090;font-weight:600;margin-right:10px;white-space:nowrap}
  .tab{display:inline-flex;align-items:center;gap:7px;font-family:"IBM Plex Mono",ui-monospace,Menlo,monospace;font-size:13px;color:#A3B4C2;background:transparent;border:1px solid #28353F;border-radius:8px;padding:7px 13px;cursor:pointer;white-space:nowrap;transition:.15s}
  .tab svg{width:15px;height:15px;flex:none}
  .tab:hover{color:#E8EFF5;border-color:#3a4a57}
  .tab.active{color:#07090C;background:linear-gradient(100deg,#D93B2B,#FF6B35);border-color:transparent;font-weight:700}
  .frames{flex:1;position:relative;min-height:0}
  .frm{position:absolute;inset:0;width:100%;height:100%;border:0;background:#07090C;display:none}
  .frm.active{display:block}
  @media print{.bar{display:none}.frames{position:static}.frm{display:block;position:static;height:auto;min-height:100vh;page-break-after:always}}
</style>
</head>
<body>
<div class="bar">
  <span class="brand">AMD CI · interview prep</span>
  <button class="tab active" data-k="jo" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.4"/><circle cx="6" cy="18" r="2.4"/><circle cx="18" cy="8" r="2.4"/><path d="M6 8.4v7.2M8.2 6.6c6 .3 7.8 1.4 7.8 5.4v2"/></svg><span>Joseph</span></button><button class="tab" data-k="ge" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6M10 3v5.5L4.6 17.4A2 2 0 0 0 6.3 20.5h11.4a2 2 0 0 0 1.7-3.1L14 8.5V3"/><path d="M7.7 14h8.6"/></svg><span>Geo Min</span></button><button class="tab" data-k="sa" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5l8.5 4.9v9.2L12 21.5l-8.5-4.9V7.4z"/><circle cx="12" cy="12" r="2.6"/><path d="M12 9.4V4.2M14.3 13.3l4.4 2.5M9.7 13.3l-4.4 2.5"/></svg><span>Sai</span></button><button class="tab" data-k="tp" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 6 3 12 8 18"/><polyline points="16 6 21 12 16 18"/></svg><span>Tech Prep</span></button><button class="tab" data-k="qa" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.5 8.5 0 1 1 21 11.5z"/></svg><span>Q&amp;A</span></button>
</div>
<div class="frames">
  <iframe class="frm active" data-k="jo" srcdoc="&lt;!DOCTYPE html&gt;&lt;html lang=&quot;en&quot; data-theme=&quot;dark&quot;&gt;&lt;head&gt;&lt;meta charset=&quot;utf-8&quot;&gt;&lt;link rel=&quot;preconnect&quot; href=&quot;https://fonts.googleapis.com&quot;&gt;&lt;link rel=&quot;preconnect&quot; href=&quot;https://fonts.gstatic.com&quot; crossorigin&gt;&lt;link href=&quot;https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&amp;family=IBM+Plex+Sans:wght@400;500;600&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap&quot; rel=&quot;stylesheet&quot;&gt;&lt;meta name=&quot;viewport&quot; content=&quot;width=device-width,initial-scale=1&quot;&gt;&lt;/head&gt;&lt;body&gt;&lt;title&gt;Joseph Macaranas — Contribution Dossier · ROCm/TheRock&lt;/title&gt;
&lt;style&gt;
  :root{
    --ground:#f5f6f8; --surface:#ffffff; --surface-2:#fbfbfc;
    --ink:#191c22; --muted:#59616e; --faint:#8a92a0;
    --hair:#e4e7ec; --hair-strong:#d3d8e0;
    --copper:#b5623a; --copper-soft:#e9d3c6; --copper-ink:#8a4526;
    --slate:#2b3444;
    --good:#2f7d5b; --warn:#a9781f; --crit:#b0413a;
    --bar-track:#eceef2;
    --shadow:0 1px 2px rgba(20,25,35,.04),0 8px 28px -14px rgba(20,25,35,.18);
    --mono:ui-monospace,&quot;SF Mono&quot;,SFMono-Regular,Menlo,Consolas,&quot;Liberation Mono&quot;,monospace;
    --sans:system-ui,-apple-system,&quot;Segoe UI&quot;,Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --ground:#14161b; --surface:#1c1f27; --surface-2:#20242d;
      --ink:#e8eaee; --muted:#9aa2b1; --faint:#6f7788;
      --hair:#2a2e38; --hair-strong:#353b47;
      --copper:#d1885f; --copper-soft:#3a2a20; --copper-ink:#e0a17d;
      --slate:#aeb8c8;
      --good:#4fae82; --warn:#d0a04a; --crit:#d76a62;
      --bar-track:#282c36;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px -16px rgba(0,0,0,.6);
    }
  }
  :root[data-theme=&quot;light&quot;]{
    --ground:#f5f6f8; --surface:#ffffff; --surface-2:#fbfbfc;
    --ink:#191c22; --muted:#59616e; --faint:#8a92a0;
    --hair:#e4e7ec; --hair-strong:#d3d8e0;
    --copper:#b5623a; --copper-soft:#e9d3c6; --copper-ink:#8a4526;
    --slate:#2b3444; --good:#2f7d5b; --warn:#a9781f; --crit:#b0413a;
    --bar-track:#eceef2; --shadow:0 1px 2px rgba(20,25,35,.04),0 8px 28px -14px rgba(20,25,35,.18);
  }
  :root[data-theme=&quot;dark&quot;]{
    --ground:#14161b; --surface:#1c1f27; --surface-2:#20242d;
    --ink:#e8eaee; --muted:#9aa2b1; --faint:#6f7788;
    --hair:#2a2e38; --hair-strong:#353b47;
    --copper:#d1885f; --copper-soft:#3a2a20; --copper-ink:#e0a17d;
    --slate:#aeb8c8; --good:#4fae82; --warn:#d0a04a; --crit:#d76a62;
    --bar-track:#282c36; --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px -16px rgba(0,0,0,.6);
  }

  *{box-sizing:border-box}
  body{margin:0}
  .page{
    background:var(--ground); color:var(--ink);
    font-family:var(--sans); line-height:1.6;
    font-size:16px; letter-spacing:-.003em;
    -webkit-font-smoothing:antialiased;
    padding:clamp(18px,4vw,52px) clamp(16px,4vw,40px) 80px;
  }
  .wrap{max-width:960px; margin:0 auto}
  .mono{font-family:var(--mono)}
  .num{font-variant-numeric:tabular-nums}

  h1,h2,h3{text-wrap:balance; margin:0; letter-spacing:-.02em; line-height:1.12}
  p{margin:0}
  a{color:var(--copper); text-decoration:none; border-bottom:1px solid var(--copper-soft)}
  a:hover{border-bottom-color:var(--copper)}
  a:focus-visible,button:focus-visible{outline:2px solid var(--copper); outline-offset:3px; border-radius:3px}

  .eyebrow{
    font-family:var(--mono); font-size:11.5px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--faint); font-weight:600;
  }

  /* ---------- Masthead ---------- */
  .mast{
    border:1px solid var(--hair); background:var(--surface);
    border-radius:14px; box-shadow:var(--shadow); overflow:hidden;
    margin-bottom:28px;
  }
  .mast-top{
    display:grid; grid-template-columns:1.5fr 1fr; gap:0;
    border-bottom:1px solid var(--hair);
  }
  .mast-id{padding:clamp(22px,3.4vw,34px)}
  .kicker-row{display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap}
  .badge{
    font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    font-weight:600; padding:4px 9px; border-radius:5px;
    background:var(--copper-soft); color:var(--copper-ink);
  }
  .mast-id h1{font-size:clamp(30px,5vw,46px); font-weight:750; margin:2px 0 6px}
  .handle{font-family:var(--mono); color:var(--copper); font-size:15px}
  .subline{color:var(--muted); font-size:15px; margin-top:14px; max-width:44ch}
  .meta-row{display:flex; gap:18px; flex-wrap:wrap; margin-top:18px}
  .meta-row .mi{display:flex; flex-direction:column; gap:1px}
  .mi .k{font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint)}
  .mi .v{font-size:14px; font-weight:600}

  .mast-stats{
    background:var(--slate); color:#fff;
    display:grid; grid-template-columns:1fr 1fr;
  }
  :root[data-theme=&quot;dark&quot;] .mast-stats{background:#0f1116}
  @media (prefers-color-scheme:dark){.mast-stats{background:#0f1116}}
  .stat{
    padding:16px 18px; border-bottom:1px solid rgba(255,255,255,.09);
    border-right:1px solid rgba(255,255,255,.09);
  }
  .mast-stats .stat:nth-child(2n){border-right:none}
  .mast-stats .stat:nth-last-child(-n+2){border-bottom:none}
  .stat .n{font-family:var(--mono); font-size:26px; font-weight:600; letter-spacing:-.02em; color:#fff}
  .stat .l{font-size:11.5px; color:rgba(255,255,255,.62); margin-top:2px; line-height:1.35}
  .stat .n .accent{color:var(--copper)}
  @media (prefers-color-scheme:dark){.stat .n .accent{color:#d1885f}}

  .mast-foot{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding:12px 22px; font-family:var(--mono); font-size:11.5px; color:var(--faint);
    flex-wrap:wrap;
  }

  /* ---------- Sections ---------- */
  section{margin-top:44px}
  .sec-head{display:flex; align-items:baseline; gap:14px; margin-bottom:20px; border-bottom:1px solid var(--hair); padding-bottom:12px}
  .sec-head .idx{font-family:var(--mono); font-size:13px; color:var(--copper); font-weight:600}
  .sec-head h2{font-size:clamp(19px,2.6vw,24px); font-weight:700}
  .lead{color:var(--muted); font-size:16.5px; max-width:70ch; margin-bottom:8px}
  .lead strong{color:var(--ink); font-weight:650}

  /* thesis callout */
  .thesis{
    background:var(--surface); border:1px solid var(--hair);
    border-left:4px solid var(--copper); border-radius:10px;
    padding:22px 24px; box-shadow:var(--shadow); display:grid;
    grid-template-columns:auto 1fr; gap:24px; align-items:center;
  }
  .ratio{text-align:center; padding-right:22px; border-right:1px solid var(--hair)}
  .ratio .big{font-family:var(--mono); font-size:44px; font-weight:600; color:var(--copper); line-height:1}
  .ratio .cap{font-family:var(--mono); font-size:10.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--faint); margin-top:6px}
  .thesis p{font-size:16px; color:var(--ink)}
  .thesis p .muted{color:var(--muted)}

  /* two-col */
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:20px}
  .card{background:var(--surface); border:1px solid var(--hair); border-radius:12px; padding:22px; box-shadow:var(--shadow)}
  .card h3{font-size:16px; font-weight:700; margin-bottom:4px}
  .card .tag{font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--copper); font-weight:600}
  .card p{color:var(--muted); font-size:14.5px; margin-top:10px}
  .card .pr{font-family:var(--mono); font-size:12px; color:var(--faint)}
  .card ul{margin:10px 0 0; padding-left:0; list-style:none; display:flex; flex-direction:column; gap:8px}
  .card ul li{font-size:14px; color:var(--muted); padding-left:16px; position:relative}
  .card ul li::before{content:&quot;→&quot;; position:absolute; left:0; color:var(--copper); font-family:var(--mono); font-size:12px}
  .card .angle{margin-top:14px; padding-top:12px; border-top:1px dashed var(--hair-strong); font-size:13.5px; color:var(--ink)}
  .card .angle b{color:var(--copper); font-weight:650}

  /* bar charts */
  .chart{background:var(--surface); border:1px solid var(--hair); border-radius:12px; padding:24px; box-shadow:var(--shadow)}
  .chart-title{font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin-bottom:20px}
  .tl{display:flex; align-items:flex-end; gap:6px; height:150px; padding-bottom:26px; position:relative; border-bottom:1px solid var(--hair)}
  .tl .col{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; position:relative}
  .tl .bar{width:100%; max-width:34px; background:var(--copper-soft); border-radius:4px 4px 0 0; position:relative; transition:background .2s}
  .tl .col.peak .bar{background:var(--copper)}
  .tl .bar .bv{position:absolute; top:-18px; left:50%; transform:translateX(-50%); font-family:var(--mono); font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums}
  .tl .xl{position:absolute; bottom:-24px; font-family:var(--mono); font-size:9.5px; color:var(--faint); white-space:nowrap; letter-spacing:.02em}

  .hbars{display:flex; flex-direction:column; gap:11px}
  .hb{display:grid; grid-template-columns:170px 1fr 42px; align-items:center; gap:12px}
  .hb .lbl{font-size:13px; color:var(--ink); text-align:right}
  .hb .track{background:var(--bar-track); border-radius:5px; height:16px; overflow:hidden}
  .hb .fill{height:100%; background:var(--copper); border-radius:5px}
  .hb.sub .fill{background:var(--copper-soft)}
  .hb .val{font-family:var(--mono); font-size:12.5px; color:var(--muted); text-align:right; font-variant-numeric:tabular-nums}

  /* domain / signals lists */
  .rows{display:flex; flex-direction:column; gap:0; border:1px solid var(--hair); border-radius:12px; overflow:hidden; background:var(--surface); box-shadow:var(--shadow)}
  .row{display:grid; grid-template-columns:auto 1fr auto; gap:16px; align-items:center; padding:14px 20px; border-bottom:1px solid var(--hair)}
  .row:last-child{border-bottom:none}
  .row .rk{font-family:var(--mono); font-size:12px; color:var(--copper); width:26px}
  .row .rt{font-size:14.5px}
  .row .rt b{font-weight:650}
  .row .rt span{color:var(--muted)}
  .row .rc{font-family:var(--mono); font-size:12px; color:var(--faint); text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums}

  /* collab chips */
  .chips{display:flex; flex-wrap:wrap; gap:10px}
  .chip{display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--hair); border-radius:20px; padding:6px 13px 6px 10px; box-shadow:var(--shadow)}
  .chip .who{font-family:var(--mono); font-size:13px; font-weight:600}
  .chip .cnt{font-family:var(--mono); font-size:11px; color:#fff; background:var(--copper); border-radius:11px; padding:1px 7px; font-variant-numeric:tabular-nums}
  .chip.bot{opacity:.72}
  .chip.bot .cnt{background:var(--slate)}
  :root[data-theme=&quot;dark&quot;] .chip.bot .cnt{color:#14161b}
  @media (prefers-color-scheme:dark){.chip.bot .cnt{color:#14161b}}

  /* Q&amp;A */
  .qa{display:flex; flex-direction:column; gap:14px}
  .q{background:var(--surface); border:1px solid var(--hair); border-radius:10px; padding:18px 20px; box-shadow:var(--shadow); display:grid; grid-template-columns:auto 1fr; gap:16px}
  .q .qn{font-family:var(--mono); font-size:20px; font-weight:600; color:var(--copper); line-height:1.1}
  .q .qt{font-size:15.5px; font-weight:600; color:var(--ink)}
  .q .why{font-size:13px; color:var(--muted); margin-top:6px}
  .q .why em{color:var(--copper); font-style:normal; font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.06em}

  /* fit */
  .fit{display:grid; grid-template-columns:1fr 1fr; gap:20px}
  .fit .col{background:var(--surface); border:1px solid var(--hair); border-radius:12px; padding:22px; box-shadow:var(--shadow)}
  .fit .col.str{border-top:3px solid var(--good)}
  .fit .col.gap{border-top:3px solid var(--warn)}
  .fit h3{font-size:14px; font-family:var(--mono); letter-spacing:.05em; text-transform:uppercase; margin-bottom:14px}
  .fit .str h3{color:var(--good)} .fit .gap h3{color:var(--warn)}
  .fit ul{margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:10px}
  .fit li{font-size:14px; color:var(--muted); padding-left:20px; position:relative; line-height:1.5}
  .fit .str li::before{content:&quot;+&quot;; position:absolute; left:0; color:var(--good); font-family:var(--mono); font-weight:700}
  .fit .gap li::before{content:&quot;?&quot;; position:absolute; left:0; color:var(--warn); font-family:var(--mono); font-weight:700}
  .fit li b{color:var(--ink); font-weight:650}

  /* deep-dive prose */
  .dd{background:var(--surface); border:1px solid var(--hair); border-radius:12px; box-shadow:var(--shadow); overflow:hidden}
  .dd-head{padding:18px 24px; border-bottom:1px solid var(--hair); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; background:var(--surface-2)}
  .dd-head h3{font-size:17px; font-weight:700}
  .dd-head .prs{font-family:var(--mono); font-size:11.5px; color:var(--copper)}
  .dd-body{padding:22px 24px; display:flex; flex-direction:column; gap:16px}
  .dd-body p{font-size:14.8px; color:var(--muted)}
  .dd-body p b{color:var(--ink); font-weight:650}
  .dd-body .mono{color:var(--copper); font-size:.92em}
  .pull{border-left:3px solid var(--copper); background:var(--copper-soft); border-radius:0 8px 8px 0; padding:14px 18px; font-size:14.5px; color:var(--ink)}
  :root[data-theme=&quot;dark&quot;] .pull{color:var(--copper-ink)}
  @media (prefers-color-scheme:dark){.pull{color:var(--copper-ink)}}
  .pull .q{font-family:var(--mono); font-style:italic; color:var(--ink)}
  .dd-body h4{font-size:12px; font-family:var(--mono); letter-spacing:.08em; text-transform:uppercase; color:var(--faint); margin:4px 0 -4px}
  .code{font-family:var(--mono); font-size:12.5px; background:var(--bar-track); border:1px solid var(--hair); border-radius:8px; padding:12px 14px; overflow-x:auto; color:var(--ink); white-space:pre; line-height:1.5}

  /* appendix */
  .apx{border:1px solid var(--hair); border-radius:10px; background:var(--surface); box-shadow:var(--shadow); margin-bottom:12px; overflow:hidden}
  .apx&gt;summary{list-style:none; cursor:pointer; padding:15px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; font-weight:650; background:var(--surface-2)}
  .apx&gt;summary::-webkit-details-marker{display:none}
  .apx&gt;summary::before{content:&quot;▸&quot;; color:var(--copper); font-family:var(--mono); margin-right:8px; transition:transform .15s}
  .apx[open]&gt;summary::before{transform:rotate(90deg)}
  .apx .rn{font-family:var(--mono); font-size:14px; color:var(--ink); flex:1}
  .apx .rc2{font-family:var(--mono); font-size:11.5px; color:var(--faint)}
  .apx-in{padding:8px 16px 16px}
  .grp{margin-top:14px}
  .grp-h{font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--copper); font-weight:600; padding:4px 0 6px; border-bottom:1px solid var(--hair); margin-bottom:4px}
  .grp-h span{color:var(--faint)}
  .arow{display:grid; grid-template-columns:16px 52px 82px 78px 1fr; gap:8px; align-items:baseline; padding:3px 0; font-size:12.5px; font-family:var(--mono); font-variant-numeric:tabular-nums; border-bottom:1px solid transparent}
  .arow:hover{background:var(--bar-track); border-radius:4px}
  .arow .st{text-align:center; font-size:11px}
  .arow .st.m{color:var(--good)} .arow .st.x{color:var(--crit)} .arow .st.o{color:var(--warn)}
  .arow .pn{color:var(--copper)}
  .arow .dd2{color:var(--faint)}
  .arow .ln{color:var(--muted); text-align:right}
  .arow .tt{color:var(--ink); font-family:var(--sans); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  @media (max-width:720px){
    .arow{grid-template-columns:14px 44px 1fr; row-gap:0}
    .arow .dd2,.arow .ln{display:none}
    .arow .tt{white-space:normal}
  }

  &lt;!-- THESIS --&gt;
  &lt;div class=&quot;thesis&quot;&gt;
    &lt;div class=&quot;ratio&quot;&gt;
      &lt;div class=&quot;big num&quot;&gt;2.5×&lt;/div&gt;

    &lt;p&gt;&lt;b&gt;Read him as a maintainer, not a feature IC.&lt;/b&gt; In TheRock he gives &lt;b&gt;243 reviews&lt;/b&gt; against 96 PRs; &lt;b&gt;ecosystem-wide it&#x27;s 541 reviews across 3 repos&lt;/b&gt; — &lt;span class=&quot;muted&quot;&gt;the single most important signal in his footprint. He is a hub the team routes CI, test, and release changes through, and a gatekeeper for the health of &lt;span class=&quot;mono&quot;&gt;main&lt;/span&gt;. See §08 — TheRock is only a third of his real scope.&lt;/span&gt;&lt;/p&gt;

  &lt;!-- 01 ROLE &amp; DOMAIN --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;01&lt;/span&gt;&lt;h2&gt;Domain — what he actually owns&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;His footprint is &lt;strong&gt;infrastructure, not compute&lt;/strong&gt;. He lives in GitHub Actions, build tooling, packaging, and submodule/release gardening — not the ROCm math/ML kernels themselves. Files touched, by frequency:&lt;/p&gt;

      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;02&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;build_tools/github_actions/&lt;/b&gt; &lt;span&gt;— tested Python CI tooling (fetch_test_configurations, configure_ci, detect_external_repo_config)&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;26 commits&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;03&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;rocm-systems / rocm-libraries&lt;/b&gt; &lt;span&gt;— submodule bumps &amp;amp; patch gardening&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;18 commits&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;04&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;docs/rfcs + docs/development&lt;/b&gt; &lt;span&gt;— authored RFC0010; Windows support docs&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;13 commits&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;05&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;core/ · dockerfiles/ · packaging/&lt;/b&gt; &lt;span&gt;— CMake wiring, manylinux images, Python SDK test packaging&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;11 commits&lt;/span&gt;&lt;/div&gt;

  &lt;!-- 03 SIGNATURE PROJECTS --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;03&lt;/span&gt;&lt;h2&gt;Signature projects — his best interview stories&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;grid2&quot;&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;Largest initiative&lt;/span&gt;
        &lt;h3&gt;CI Deduplication&lt;/h3&gt;
        &lt;p&gt;A major refactor letting external repos (rocm-systems, rocm-libraries) reuse TheRock&#x27;s CI instead of copying it.&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;span class=&quot;pr&quot;&gt;#2771&lt;/span&gt; Deduplicate TheRock CI &amp;nbsp;&lt;b&gt;+2,177 / −208&lt;/b&gt;, 17 files&lt;/li&gt;
          &lt;li&gt;&lt;span class=&quot;pr&quot;&gt;#2955&lt;/span&gt; Reverted it &lt;b&gt;the next day&lt;/b&gt; (−2,196)&lt;/li&gt;
          &lt;li&gt;&lt;span class=&quot;pr&quot;&gt;#3181 · #3184&lt;/span&gt; Rebuilt incrementally: external-repo detection module + env-var standardization&lt;/li&gt;
        &lt;/ul&gt;
        &lt;p class=&quot;angle&quot;&gt;&lt;b&gt;Ask:&lt;/b&gt; Why revert the big-bang change and re-land it piece by piece? Tests blast-radius awareness, revert discipline, safe rollout.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;Design leadership&lt;/span&gt;
        &lt;h3&gt;RFC0010 — Test-script migration&lt;/h3&gt;
        &lt;p&gt;Authored a formal RFC to move ~35 test-runner scripts out of TheRock into the repos that own the code they test.&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;Wrote trade-off analysis (placement options A/B/C) + a discussion thread&lt;/li&gt;
          &lt;li&gt;Argued ownership, discoverability, co-evolution, scalability&lt;/li&gt;
          &lt;li&gt;&lt;span class=&quot;pr&quot;&gt;#4045 · #4041&lt;/span&gt; Executed in phases; &lt;span class=&quot;pr&quot;&gt;#4563&lt;/span&gt; reverted once, then re-landed&lt;/li&gt;
        &lt;/ul&gt;
        &lt;p class=&quot;angle&quot;&gt;&lt;b&gt;Ask:&lt;/b&gt; How did you drive cross-team consensus and align CODEOWNERS? His strongest organizational-thinking signal.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;Recent · CI cost&lt;/span&gt;
        &lt;h3&gt;Baseline reuse &amp;amp; build topology&lt;/h3&gt;
        &lt;p&gt;2026 work to skip redundant builds by reusing prior baselines across multi-arch dispatch.&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;span class=&quot;pr&quot;&gt;#5435&lt;/span&gt; Baseline run selection helpers &lt;b&gt;(+934)&lt;/b&gt;&lt;/li&gt;
          &lt;li&gt;&lt;span class=&quot;pr&quot;&gt;#5434&lt;/span&gt; Build-topology reverse-index helpers &lt;b&gt;(+281)&lt;/b&gt;&lt;/li&gt;
          &lt;li&gt;Wired baseline selection into multi-arch dispatch (tested)&lt;/li&gt;
        &lt;/ul&gt;
        &lt;p class=&quot;angle&quot;&gt;&lt;b&gt;Ask:&lt;/b&gt; How do you measure and cut CI time/cost at ROCm&#x27;s scale? Higher-order systems thinking.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;Cross-platform&lt;/span&gt;
        &lt;h3&gt;Windows / WSL ROCDXG packaging&lt;/h3&gt;
        &lt;p&gt;Packaging ROCm&#x27;s DirectX-on-WSL graphics runtime and running Windows hip-tests in dual PAL / ROCR modes.&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;span class=&quot;pr&quot;&gt;#5283 · #4541&lt;/span&gt; Multi-arch WSL rocdxg stage + runtime packaging&lt;/li&gt;
          &lt;li&gt;&lt;span class=&quot;pr&quot;&gt;#3593&lt;/span&gt; Windows hip-tests: PAL (pass/fail) + ROCR (informational)&lt;/li&gt;
          &lt;li&gt;&lt;span class=&quot;pr&quot;&gt;#5345 · #5378&lt;/span&gt; Re-enable &amp;amp; fix WSL CI, fork-upload handling&lt;/li&gt;
        &lt;/ul&gt;
        &lt;p class=&quot;angle&quot;&gt;&lt;b&gt;Ask:&lt;/b&gt; What&#x27;s hard about ROCm on Windows/WSL vs Linux? Cross-platform build/packaging depth.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 04 WORKING STYLE --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;04&lt;/span&gt;&lt;h2&gt;Working style — signals from the record&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;rows&quot;&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;A&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Protects main, not afraid to revert.&lt;/b&gt; &lt;span&gt;Multiple disciplined self-reverts (CI dedup, RFC0010, kfdtest #6142). Reads as judgment, not churn.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;reliability&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;B&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Engineers his tooling.&lt;/b&gt; &lt;span&gt;CI Python ships with unit tests (fetch_test_configurations_test.py, detect_external_repo_config test). Not just YAML plumbing.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;rigor&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;C&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Keeps CI honest.&lt;/b&gt; &lt;span&gt;Timeout tuning (#2089/#2103/#2059), runner-health checks (#2085), flakiness handling — without masking real regressions.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;ops&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;D&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Clean hygiene.&lt;/b&gt; &lt;span&gt;Conventional commits (fix(ci):, feat(ci):), pre-commit formatting, actionlint upgrades, RFC-first for big changes.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;craft&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 05 COLLABORATION --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;05&lt;/span&gt;&lt;h2&gt;Collaboration graph — whom he reviews&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;His reviews fan out across the team and the automated submodule bots. Heaviest human pairing is with &lt;strong&gt;@geomin12&lt;/strong&gt;; he also reviews work from &lt;strong&gt;@stellaraccident&lt;/strong&gt; (Stella Laurenzo, TheRock&#x27;s lead) — a peer-level signal. Recent review targets:&lt;/p&gt;
    &lt;div class=&quot;chips&quot;&gt;
      &lt;span class=&quot;chip&quot;&gt;&lt;span class=&quot;who&quot;&gt;geomin12&lt;/span&gt;&lt;span class=&quot;cnt num&quot;&gt;28&lt;/span&gt;&lt;/span&gt;

  &lt;!-- 09 DEEP DIVE: CI DEDUP --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;09&lt;/span&gt;&lt;h2&gt;Deep-dive — CI Deduplication &amp;amp; the revert&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;dd&quot;&gt;
      &lt;div class=&quot;dd-head&quot;&gt;&lt;h3&gt;One source of truth for CI across three repos&lt;/h3&gt;&lt;span class=&quot;prs&quot;&gt;#2771 → #2955 → #3181&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;dd-body&quot;&gt;
        &lt;p&gt;&lt;b&gt;The problem:&lt;/b&gt; CI logic was &lt;b&gt;triplicated&lt;/b&gt; — &lt;span class=&quot;mono&quot;&gt;amdgpu_family_matrix.py&lt;/span&gt; and &lt;span class=&quot;mono&quot;&gt;configure_ci.py&lt;/span&gt; existed in all three repos and drifted apart. His fix centralized the matrix in TheRock so the super-repos call &lt;b&gt;TheRock&#x27;s&lt;/b&gt; workflows on Linux and Windows.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;What #2771 shipped (+2,177/−208, 17 files):&lt;/b&gt; new &lt;span class=&quot;mono&quot;&gt;detect_external_repo_config.py&lt;/span&gt; (repo→GHA-outputs), &lt;span class=&quot;mono&quot;&gt;external_repo_project_maps.py&lt;/span&gt; (+472), a rewritten &lt;span class=&quot;mono&quot;&gt;configure_ci.py&lt;/span&gt;, and &lt;b&gt;three new test files (+543)&lt;/b&gt;. It was designed to let rocm-libraries delete 6 CI files and rocm-systems delete 5 — 11 duplicated files gone.&lt;/p&gt;
        &lt;h4&gt;Why it was reverted the same day — the real story&lt;/h4&gt;
        &lt;div class=&quot;pull&quot;&gt;A reviewer asked him to revert &lt;b&gt;after merge&lt;/b&gt;, citing the LLVM post-commit-review policy: &lt;span class=&quot;q&quot;&gt;&quot;If a community member expresses a concern about a recent commit that would have prevented merge, the patch should be reverted.&quot;&lt;/span&gt; Joseph replied &lt;b&gt;&quot;Taking a look,&quot;&lt;/b&gt; then reverted cleanly — no defensiveness — noting only &lt;span class=&quot;q&quot;&gt;&quot;Deduplication design requires further changes.&quot;&lt;/span&gt;&lt;/div&gt;
        &lt;p&gt;&lt;b&gt;How he re-landed it:&lt;/b&gt; instead of re-pushing 2,177 lines, he &lt;b&gt;decomposed&lt;/b&gt; — landing just the self-contained, well-tested detection module in isolation (&lt;span class=&quot;mono&quot;&gt;#3181, +735&lt;/span&gt;) and decoupling a naming dependency (&lt;span class=&quot;mono&quot;&gt;#3184&lt;/span&gt;). A 3,500-line &quot;refactor&quot; retry (#2960) and #3188/#3192 were floated and &lt;b&gt;deliberately closed&lt;/b&gt; rather than forced through.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;The signal:&lt;/b&gt; he handles being told he&#x27;s wrong with zero ego, knows community norms cold, and learned to ship in reviewable increments. This is his strongest behavioral moment on record.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 10 DEEP DIVE: RFC0010 --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;10&lt;/span&gt;&lt;h2&gt;Deep-dive — RFC0010 test-script migration&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;dd&quot;&gt;
      &lt;div class=&quot;dd-head&quot;&gt;&lt;h3&gt;Move ~35 test scripts to the repos that own the code&lt;/h3&gt;&lt;span class=&quot;prs&quot;&gt;#3907 · exec #4190/#4197/#5563/#5572&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;dd-body&quot;&gt;
        &lt;p&gt;&lt;b&gt;The thesis:&lt;/b&gt; ~35 pytest runners lived in TheRock, but the binaries they test live in rocm-systems (8) and rocm-libraries (22+). He argued this breaks &lt;b&gt;ownership, discoverability, co-evolution, and scalability.&lt;/b&gt;&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;Engineering maturity in the doc:&lt;/b&gt; three placement options weighed with pros/cons; he chose &lt;b&gt;Option B&lt;/b&gt; (&lt;span class=&quot;mono&quot;&gt;test/therock/&lt;/span&gt; at repo root) explicitly to &lt;b&gt;minimise CODEOWNERS approvals&lt;/b&gt;, with co-location (Option A) deferred to a follow-on RFC. A &lt;b&gt;6-step migration plan&lt;/b&gt; (inventory → copy → finalize → switch CI → validate → delete) and a per-script inventory table mapping every file to its caller type and helper imports.&lt;/p&gt;
        &lt;h4&gt;The subtle technical crux&lt;/h4&gt;
        &lt;p&gt;Scripts hardcoded &lt;span class=&quot;mono&quot;&gt;SCRIPT_DIR.parent.parent.parent&lt;/span&gt; to find TheRock&#x27;s helpers — which breaks once moved. His fix works both as a submodule and standalone:&lt;/p&gt;
        &lt;div class=&quot;code&quot;&gt;Path(os.environ.get(&quot;THEROCK_DIR&quot;)
     or SCRIPT_DIR.parent.parent.parent).resolve()&lt;/div&gt;
        &lt;p&gt;He also caught that &lt;span class=&quot;mono&quot;&gt;test_rccl.py&lt;/span&gt; needed a header reorder so &lt;span class=&quot;mono&quot;&gt;THEROCK_DIR&lt;/span&gt; is set &lt;b&gt;before&lt;/b&gt; the dependent &lt;span class=&quot;mono&quot;&gt;sys.path&lt;/span&gt; insert — the kind of ordering bug only found by doing the work.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;Executed across repos:&lt;/b&gt; #4190/#5563 seeded the scripts, #4197/#5572 fixed path resolution, followed by dozens of per-component &quot;install test runner&quot; PRs. &lt;span class=&quot;mono&quot;&gt;#4045&lt;/span&gt; was reverted (&lt;span class=&quot;mono&quot;&gt;#4563&lt;/span&gt;) on a &lt;b&gt;pre-declared blocker&lt;/b&gt; — Step 4 can&#x27;t switch CI until the submodule refs are bumped in TheRock. Continuation is open at &lt;span class=&quot;mono&quot;&gt;#5115&lt;/span&gt; (+1,034).&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;The signal:&lt;/b&gt; staged migration thinking, cross-team coordination, and &quot;know exactly what breaks&quot; rigor — his clearest architectural/organizational evidence.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 12 QUESTIONS HE WILL ASK YOU --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;12&lt;/span&gt;&lt;h2&gt;What &lt;em&gt;he&lt;/em&gt; will likely ask you&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;Interviewers probe their own turf. His turf is &lt;strong&gt;CI/CD at scale, build &amp;amp; release engineering, monorepo mechanics, and test infrastructure&lt;/strong&gt; — expect depth there, and expect him to anchor on &lt;strong&gt;your current setup and its pain points&lt;/strong&gt;. Two clusters:&lt;/p&gt;

    &lt;div class=&quot;grid2&quot; style=&quot;margin-bottom:20px&quot;&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;Cluster A · His expertise&lt;/span&gt;
        &lt;h3&gt;Technical, grounded in what he builds&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;b&gt;CI design:&lt;/b&gt; &quot;How would you cut duplicated CI across N repos without a monorepo? Reusable workflows vs. copy-paste?&quot; (his #2771 world)&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Build systems:&lt;/b&gt; &quot;Walk me through a CMake superbuild — how do you get fast incremental rebuilds? ccache/sccache, artifact reuse?&quot;&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Test infra:&lt;/b&gt; &quot;How do you keep a large test suite fast — sharding, selection, baseline reuse? Presubmit vs. postsubmit gating?&quot;&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Flaky tests &amp;amp; timeouts:&lt;/b&gt; &quot;A test fails 1 in 20 runs. What do you do — and how do you avoid masking a real regression?&quot;&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Release/packaging:&lt;/b&gt; &quot;Multi-arch wheels / manylinux — how do you package and version artifacts for many GPU targets?&quot;&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Rollback:&lt;/b&gt; &quot;A bad change lands on main. Revert-first or fix-forward? Why?&quot; (he lives this — have a real answer)&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Cross-platform:&lt;/b&gt; &quot;What changes when you take a Linux build to Windows/WSL?&quot;&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;Cluster B · Your current setup&lt;/span&gt;
        &lt;h3&gt;&quot;Current setup &amp;amp; current issues&quot; probes&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&quot;Describe your &lt;b&gt;current CI/CD pipeline&lt;/b&gt; end-to-end — trigger to deploy.&quot;&lt;/li&gt;
          &lt;li&gt;&quot;What&#x27;s the &lt;b&gt;biggest bottleneck&lt;/b&gt; in your build/test cycle today, and what have you done about it?&quot;&lt;/li&gt;
          &lt;li&gt;&quot;How long is a full build, and how do you make iteration &lt;b&gt;faster&lt;/b&gt; for developers?&quot;&lt;/li&gt;
          &lt;li&gt;&quot;How do you manage &lt;b&gt;dependencies / submodules / third-party&lt;/b&gt; versions today?&quot;&lt;/li&gt;
          &lt;li&gt;&quot;What &lt;b&gt;breaks most often&lt;/b&gt; in your CI, and how do you triage a red pipeline?&quot;&lt;/li&gt;
          &lt;li&gt;&quot;How do you handle &lt;b&gt;flaky tests&lt;/b&gt; right now — quarantine, retries, or ignore?&quot;&lt;/li&gt;
          &lt;li&gt;&quot;What would you &lt;b&gt;change first&lt;/b&gt; if you owned our build system?&quot;&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;dd&quot;&gt;
      &lt;div class=&quot;dd-head&quot;&gt;&lt;h3&gt;How to prep for Cluster B — turn &quot;current issues&quot; into a story&lt;/h3&gt;&lt;span class=&quot;prs&quot;&gt;strategy&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;dd-body&quot;&gt;
        &lt;p&gt;&lt;b&gt;He is testing diagnosis, not complaint.&lt;/b&gt; For every pain point you raise, carry the full arc: &lt;span class=&quot;mono&quot;&gt;symptom → root cause → what you tried → measured result → what&#x27;s still open.&lt;/span&gt; That mirrors exactly how &lt;em&gt;he&lt;/em&gt; works — his own reverts and RFCs are documented that way.&lt;/p&gt;
        &lt;div class=&quot;pull&quot;&gt;Pick &lt;b&gt;one real bottleneck&lt;/b&gt; from your current setup and be able to go three questions deep on it. A candidate who says &quot;builds are slow&quot; loses; one who says &quot;builds were 40 min, ccache hit-rate was 30% because of non-deterministic flags, we pinned them and got to 12 min, remote caching is the next step&quot; wins with him.&lt;/div&gt;
        &lt;p&gt;&lt;b&gt;Have opinions, hold them loosely.&lt;/b&gt; He reverted his own 2,000-line PR when a reviewer objected. He&#x27;ll respect a strong take &lt;em&gt;paired with&lt;/em&gt; &quot;…but I&#x27;d validate it in a small PR first.&quot; Dogmatism reads as a red flag to someone with his revert discipline.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;Know his vocabulary.&lt;/b&gt; Presubmit/postsubmit gating, matrix builds, reusable workflows, artifact provenance, baseline reuse, sharding, patch-back/merge-sync, CODEOWNERS. Using the right words signals you live in this world.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;Turn it around.&lt;/b&gt; Strong closing question for him: &lt;span class=&quot;mono&quot;&gt;&quot;What&#x27;s the hardest CI/build problem on your team right now — flaky tests, build time, or multi-repo coordination?&quot;&lt;/span&gt; All three are things he owns; it invites a real conversation and shows you did the homework.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;footer&gt;
    &lt;b&gt;Methodology.&lt;/b&gt; Compiled from the ROCm/TheRock git history (76 commits on &lt;span style=&quot;color:var(--copper)&quot;&gt;main&lt;/span&gt;, all author emails) and the GitHub API (PR authorship, review &amp;amp; comment counts, collaboration graph). Review/comment totals via GitHub search; collaboration counts sampled from the 100 most-recent reviews. Figures current as of the analysis date.&lt;br&gt;
    &lt;b&gt;Note.&lt;/b&gt; Public-repo signal only — internal AMD work, design docs, and Jira are not visible here and likely understate his scope.
  &lt;/footer&gt;

      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;Foundational&lt;/span&gt;
        &lt;h3&gt;Matrix CI + pipeline decoupling&lt;/h3&gt;

  &lt;!-- 07 DEEP DIVE 1 --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;07&lt;/span&gt;&lt;h2&gt;Deep-dive — the CI pipeline he built&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;dd&quot;&gt;
      &lt;div class=&quot;dd-head&quot;&gt;&lt;h3&gt;From a monolithic pipeline to an independent per-arch matrix&lt;/h3&gt;&lt;span class=&quot;prs&quot;&gt;#310 · #538 · #927&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;dd-body&quot;&gt;
        &lt;p&gt;&lt;b&gt;#310 — matrix of targets.&lt;/b&gt; Early in TheRock&#x27;s life he refactored CI to build a &lt;b&gt;matrix of GPU targets&lt;/b&gt;, driven by labels and a comma-separated target list on &lt;span class=&quot;mono&quot;&gt;workflow_dispatch&lt;/span&gt;. This is the backbone the whole project&#x27;s multi-arch CI still rides on.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;#538 — decouple build and test.&lt;/b&gt; In his words: &lt;span class=&quot;q&quot;&gt;&quot;Previously, build and test jobs were dependent on each other, so all builds had to finish for tests to run. If any build failed, no tests ran — not ideal.&quot;&lt;/span&gt; He made each arch&#x27;s build+test &lt;b&gt;independent&lt;/b&gt;, so a &lt;span class=&quot;mono&quot;&gt;gfx1151&lt;/span&gt; build failure no longer blocks &lt;span class=&quot;mono&quot;&gt;gfx94X&lt;/span&gt; from building and testing. Classic fan-out isolation — fault in one lane stays in that lane.&lt;/p&gt;
        &lt;div class=&quot;pull&quot;&gt;The pattern to note: he thinks in &lt;b&gt;pipeline topology&lt;/b&gt; — where the barriers are, what blocks what, and how to keep a failure&#x27;s blast radius to a single matrix cell. That&#x27;s the same instinct #927 (condensing duplicated test workflows) comes from.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 08 DEEP DIVE 2 --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;08&lt;/span&gt;&lt;h2&gt;Deep-dive — cutting CI cost without losing coverage&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;dd&quot;&gt;
      &lt;div class=&quot;dd-head&quot;&gt;&lt;h3&gt;Smoke-by-default, then build only what changed&lt;/h3&gt;&lt;span class=&quot;prs&quot;&gt;#1649 · #6451 · #6310&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;dd-body&quot;&gt;
        &lt;p&gt;&lt;b&gt;#1649 — smoke tests by default.&lt;/b&gt; His framing: &lt;span class=&quot;q&quot;&gt;&quot;TheRock CI runs entire test suites and takes significant resources, causing major delays on PR work across TheRock, rocm-libraries and rocm-systems. Since most PRs improve the environment rather than change the libraries, run smoke tests as default&quot;&lt;/span&gt; — each running a few seconds. A pragmatic bet on the &lt;b&gt;common case&lt;/b&gt;: cheap signal on every PR, full suites only when warranted.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;#6451 — selective builds (&lt;span class=&quot;mono&quot;&gt;--projects&lt;/span&gt;, open).&lt;/b&gt; Adds the ability to build &lt;b&gt;specific projects without building an entire stage&lt;/b&gt;, so external repos (e.g. rocm-systems) can trigger builds that only compile the components they changed. Notably it&#x27;s explicitly shipped as &lt;b&gt;&quot;Part 1 of 2&quot;&lt;/b&gt; — the build capability now, workflow integration in a follow-on PR. Incremental, reviewable delivery.&lt;/p&gt;
        &lt;div class=&quot;pull&quot;&gt;This is the live tension worth probing: &lt;span class=&quot;q&quot;&gt;how do you skip work on CI without letting a real regression through?&lt;/span&gt; His answer is layered — smoke by default, labels to opt into more, selective builds scoped to the actual diff. He lives this trade-off right now.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 09 FIT --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;09&lt;/span&gt;&lt;h2&gt;Fit assessment&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;fit&quot;&gt;
      &lt;div class=&quot;col str&quot;&gt;
        &lt;h3&gt;Strengths (evidenced)&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;b&gt;Deepest test-execution knowledge on TheRock&lt;/b&gt; — owns the runner scripts and harness.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;CI pipeline architecture&lt;/b&gt; — matrix builds, fan-out isolation, workflow consolidation.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;CI cost/efficiency&lt;/b&gt; — smoke-by-default, selective builds, test filtering.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Fleet reliability&lt;/b&gt; — memory monitors, GPU release, retries, reproduction.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Sheer throughput + heavy reviewer&lt;/b&gt; — 571 PRs, 1,193 reviews; a load-bearing team member.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Full-stack range&lt;/b&gt; — front-end, data pipelines, IaC on the side.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;col gap&quot;&gt;
        &lt;h3&gt;Probe if the role needs it&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;b&gt;ROCm kernel / HIP / C++ compute internals&lt;/b&gt; — footprint is CI/test infra, not compute libraries.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Formal design / RFC leadership&lt;/b&gt; — he executes at volume; the RFC-driven architecture work skews to Joseph. Ask how he approaches larger design decisions.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Depth vs. breadth&lt;/b&gt; — extremely broad surface; probe how deep he goes on any one subsystem you care about.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 10 QUESTIONS TO ASK HIM --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;10&lt;/span&gt;&lt;h2&gt;Questions to ask him&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;qa&quot;&gt;
      &lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;qn&quot;&gt;1&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;qt&quot;&gt;You made build and test jobs independent (#538) and condensed the test workflows (#927) — how do you think about CI pipeline topology at this scale?&lt;/div&gt;&lt;div class=&quot;why&quot;&gt;&lt;em&gt;Probes&lt;/em&gt; systems design · fan-out isolation&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;qn&quot;&gt;2&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;qt&quot;&gt;Your recent work is all selective builds, retries, test_filter labels — how do you decide what NOT to run without missing a regression?&lt;/div&gt;&lt;div class=&quot;why&quot;&gt;&lt;em&gt;Probes&lt;/em&gt; the core CI-cost trade-off he lives&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;qn&quot;&gt;3&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;qt&quot;&gt;You own the test-runner scripts and the GPU fleet&#x27;s health (#4718, #5491, #4050) — how do you route tests to gfx hardware and recover a wedged runner?&lt;/div&gt;&lt;div class=&quot;why&quot;&gt;&lt;em&gt;Probes&lt;/em&gt; test-execution &amp;amp; fleet ops depth&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;qn&quot;&gt;4&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;qt&quot;&gt;You review ~800 PRs in TheRock. What does a good CI PR look like to you — and what gets a request-changes?&lt;/div&gt;&lt;div class=&quot;why&quot;&gt;&lt;em&gt;Probes&lt;/em&gt; review bar · quality philosophy&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 11 WHAT HE ASKS YOU --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;11&lt;/span&gt;&lt;h2&gt;What &lt;em&gt;he&lt;/em&gt; will likely ask you&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;His turf is &lt;strong&gt;test infrastructure, CI pipeline design, and build/test efficiency on a GPU fleet&lt;/strong&gt;. Expect concrete, hands-on questions — and expect him to anchor on your &lt;strong&gt;current setup and its pain points&lt;/strong&gt;.&lt;/p&gt;
    &lt;div class=&quot;grid2&quot; style=&quot;margin-bottom:20px&quot;&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;Cluster A · His expertise&lt;/span&gt;
        &lt;h3&gt;Technical, test-and-CI flavored&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;b&gt;Pipeline design:&lt;/b&gt; &quot;How would you structure build vs. test jobs so one failure doesn&#x27;t block everything?&quot;&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Test selection:&lt;/b&gt; &quot;A full suite is too slow on every PR. How do you decide what to run — smoke, changed-only, labels?&quot;&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Flaky tests:&lt;/b&gt; &quot;Retry, quarantine, or fix? How do you tell a flake from a real failure?&quot;&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Reproducing CI:&lt;/b&gt; &quot;A test passes locally but fails only in CI — how do you debug it?&quot;&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Fleet ops:&lt;/b&gt; &quot;How do you keep self-hosted GPU runners healthy — memory pressure, stuck jobs, resource release?&quot;&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Matrix scale:&lt;/b&gt; &quot;How do you route the right test to the right GPU architecture?&quot;&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;Cluster B · Your current setup&lt;/span&gt;
        &lt;h3&gt;&quot;Current setup &amp;amp; issues&quot; probes&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&quot;Walk me through your &lt;b&gt;current test pipeline&lt;/b&gt; — trigger to result.&quot;&lt;/li&gt;
          &lt;li&gt;&quot;What&#x27;s your &lt;b&gt;slowest / flakiest&lt;/b&gt; part of CI, and what did you do about it?&quot;&lt;/li&gt;
          &lt;li&gt;&quot;How long does a full CI run take, and how do you make it &lt;b&gt;faster&lt;/b&gt;?&quot;&lt;/li&gt;
          &lt;li&gt;&quot;How do you handle &lt;b&gt;flaky tests&lt;/b&gt; today?&quot;&lt;/li&gt;
          &lt;li&gt;&quot;How do you &lt;b&gt;reproduce a CI-only failure&lt;/b&gt; locally?&quot;&lt;/li&gt;
          &lt;li&gt;&quot;If you owned our test infra, what would you &lt;b&gt;change first&lt;/b&gt;?&quot;&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;dd&quot;&gt;
      &lt;div class=&quot;dd-head&quot;&gt;&lt;h3&gt;How to win with Geo&lt;/h3&gt;&lt;span class=&quot;prs&quot;&gt;strategy&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;dd-body&quot;&gt;
        &lt;p&gt;&lt;b&gt;Be concrete and metric-driven.&lt;/b&gt; He optimizes CI for a living — vague answers lose. Carry one real story with numbers: &lt;span class=&quot;mono&quot;&gt;&quot;full suite was 45 min on every PR → we ran smoke-by-default + changed-file selection → median PR CI dropped to 8 min, with nightly full coverage.&quot;&lt;/span&gt; That&#x27;s literally his #1649 + #6451 playbook; speaking it signals you think like he does.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;Respect the &quot;don&#x27;t skip blindly&quot; tension.&lt;/b&gt; If you propose skipping tests, immediately address &lt;b&gt;how you avoid missing regressions&lt;/b&gt; (nightly full runs, coverage gates, changed-dependency analysis). He&#x27;ll push on exactly that.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;Show fleet-reality awareness.&lt;/b&gt; Mention runner health, resource cleanup, and reproducibility — the unglamorous ops he clearly values (#4050/#5491/#4016). It reads as &quot;has actually operated CI,&quot; not just written YAML.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;Turn it around:&lt;/b&gt; &lt;span class=&quot;mono&quot;&gt;&quot;What&#x27;s your biggest CI-time or flaky-test problem right now, and how are you attacking it?&quot;&lt;/span&gt; — it&#x27;s the thing he owns; it invites a real, peer-level conversation.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

&lt;div class=&quot;page&quot;&gt;
&lt;div class=&quot;wrap&quot;&gt;

  &lt;div class=&quot;mast&quot;&gt;
    &lt;div class=&quot;mast-top&quot;&gt;
      &lt;div class=&quot;mast-id&quot;&gt;
        &lt;div class=&quot;kicker-row&quot;&gt;&lt;span class=&quot;eyebrow&quot;&gt;Contribution Dossier&lt;/span&gt;&lt;span class=&quot;badge&quot;&gt;Interview Prep&lt;/span&gt;&lt;/div&gt;
        &lt;h1&gt;Sai Enduri&lt;/h1&gt;
        &lt;div class=&quot;handle&quot;&gt;@saienduri&lt;/div&gt;
        &lt;p class=&quot;subline&quot;&gt;&lt;b&gt;Kubernetes runner-fleet &amp;amp; GPU-CI engineer&lt;/b&gt; (from the nod.ai / IREE side). Of your three interviewers, his work is the &lt;b&gt;closest match to this job&lt;/b&gt;.&lt;/p&gt;
        &lt;div class=&quot;meta-row&quot;&gt;
          &lt;div class=&quot;mi&quot;&gt;&lt;span class=&quot;k&quot;&gt;Employer&lt;/span&gt;&lt;span class=&quot;v&quot;&gt;AMD (via nod.ai)&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;mi&quot;&gt;&lt;span class=&quot;k&quot;&gt;Location&lt;/span&gt;&lt;span class=&quot;v&quot;&gt;San Jose, CA&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;mi&quot;&gt;&lt;span class=&quot;k&quot;&gt;GitHub since&lt;/span&gt;&lt;span class=&quot;v&quot;&gt;2021&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;mi&quot;&gt;&lt;span class=&quot;k&quot;&gt;Focus&lt;/span&gt;&lt;span class=&quot;v&quot;&gt;ARC · k8s · GPU CI&lt;/span&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;mast-stats&quot;&gt;
        &lt;div class=&quot;stat&quot;&gt;&lt;div class=&quot;n num&quot;&gt;337&lt;/div&gt;&lt;div class=&quot;l&quot;&gt;PRs authored (all GitHub)&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;stat&quot;&gt;&lt;div class=&quot;n num&quot;&gt;312&lt;/div&gt;&lt;div class=&quot;l&quot;&gt;Reviews given&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;stat&quot;&gt;&lt;div class=&quot;n num&quot;&gt;2&lt;/div&gt;&lt;div class=&quot;l&quot;&gt;PRs in TheRock &lt;span class=&quot;accent&quot;&gt;(!)&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;stat&quot;&gt;&lt;div class=&quot;n num&quot;&gt;67&lt;/div&gt;&lt;div class=&quot;l&quot;&gt;PRs in sglang + pytorch&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;mast-foot&quot;&gt;
      &lt;span&gt;SUBJECT · works across the ML/CI ecosystem, not TheRock&lt;/span&gt;
      &lt;span&gt;THE JD MATCH · ARC self-hosted runners on Kubernetes → cloud&lt;/span&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;thesis&quot;&gt;
    &lt;div class=&quot;ratio&quot;&gt;&lt;div class=&quot;big num&quot;&gt;the JD,&lt;br&gt;in a person&lt;/div&gt;&lt;div class=&quot;cap&quot;&gt;closest match&lt;/div&gt;&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;Read him as the infrastructure-under-the-runners person.&lt;/b&gt; Where Joseph and Geo write GitHub Actions &lt;em&gt;workflows&lt;/em&gt;, Sai builds what they run on: &lt;b&gt;self-hosted runners on Kubernetes (ARC), GPU clusters, and AMD CI for ML frameworks&lt;/b&gt;. &lt;span class=&quot;muted&quot;&gt;He has literally stood up ARC on Azure Kubernetes, stress-tested MI300/MI325 runner capacity for PyTorch, and owns AMD CI for SGLang. This job — provision runners, validate on real hardware, move to cloud — is his day-to-day.&lt;/span&gt;&lt;/p&gt;
  &lt;/div&gt;

  &lt;!-- 01 WHERE HE WORKS --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;01&lt;/span&gt;&lt;h2&gt;Where he actually works&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;Barely in TheRock (2 PRs). His footprint is the &lt;strong&gt;ML-framework + CI-fleet ecosystem&lt;/strong&gt; — much of it &lt;span class=&quot;mono&quot;&gt;nod-ai/*&lt;/span&gt; and &lt;span class=&quot;mono&quot;&gt;iree-org/*&lt;/span&gt; (the compiler group that joined AMD):&lt;/p&gt;
    &lt;div class=&quot;chart&quot;&gt;
      &lt;div class=&quot;chart-title&quot;&gt;PRs authored, by repository&lt;/div&gt;
      &lt;div class=&quot;hbars&quot;&gt;
        &lt;div class=&quot;hb&quot;&gt;&lt;span class=&quot;lbl&quot;&gt;&lt;b&gt;sgl-project/sglang&lt;/b&gt; · AMD CI&lt;/span&gt;&lt;span class=&quot;track&quot;&gt;&lt;span class=&quot;fill&quot; style=&quot;width:100%&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;val&quot;&gt;47&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;hb&quot;&gt;&lt;span class=&quot;lbl&quot;&gt;&lt;b&gt;pytorch/pytorch&lt;/b&gt; · AMD capacity&lt;/span&gt;&lt;span class=&quot;track&quot;&gt;&lt;span class=&quot;fill&quot; style=&quot;width:43%&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;val&quot;&gt;20&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;hb&quot;&gt;&lt;span class=&quot;lbl&quot;&gt;&lt;b&gt;nod-ai/ossci-fleet&lt;/b&gt; · k8s CI&lt;/span&gt;&lt;span class=&quot;track&quot;&gt;&lt;span class=&quot;fill&quot; style=&quot;width:26%&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;val&quot;&gt;12&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;hb&quot;&gt;&lt;span class=&quot;lbl&quot;&gt;gpu-mode/kernelbot&lt;/span&gt;&lt;span class=&quot;track&quot;&gt;&lt;span class=&quot;fill&quot; style=&quot;width:17%&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;val&quot;&gt;8&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;hb&quot;&gt;&lt;span class=&quot;lbl&quot;&gt;&lt;b&gt;nod-ai/GitHub-ARC-Setup&lt;/b&gt;&lt;/span&gt;&lt;span class=&quot;track&quot;&gt;&lt;span class=&quot;fill&quot; style=&quot;width:9%&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;val&quot;&gt;4&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;hb sub&quot;&gt;&lt;span class=&quot;lbl&quot;&gt;ROCm/TheRock&lt;/span&gt;&lt;span class=&quot;track&quot;&gt;&lt;span class=&quot;fill&quot; style=&quot;width:4%&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;val&quot;&gt;2&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 02 SIGNATURE --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;02&lt;/span&gt;&lt;h2&gt;What he&#x27;s built&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;grid2&quot;&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;The JD&#x27;s core&lt;/span&gt;
        &lt;h3&gt;Self-hosted runners on Kubernetes (ARC)&lt;/h3&gt;
        &lt;p&gt;Stood up GitHub Actions Runner Controller on Azure Kubernetes for GPU CI.&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;ROCm Linux &lt;em&gt;and&lt;/em&gt; Windows runners on ARC&lt;/li&gt;
          &lt;li&gt;Moved docker-in-docker to a &lt;b&gt;sidecar&lt;/b&gt; (real runner-arch detail)&lt;/li&gt;
          &lt;li&gt;Personal &lt;span class=&quot;mono&quot;&gt;AKS-GitHubARC-Setup&lt;/span&gt; docs; &lt;span class=&quot;mono&quot;&gt;arc-windows-runner&lt;/span&gt;&lt;/li&gt;
        &lt;/ul&gt;
        &lt;span class=&quot;pr&quot;&gt;nod-ai/GitHub-ARC-Setup · AKS-GitHubARC-Setup&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;GPU cluster ops&lt;/span&gt;
        &lt;h3&gt;Interactive dev on a shared GPU fleet&lt;/h3&gt;
        &lt;p&gt;Built engineer access to the cluster: SSH into k8s pods, bring-your-own image.&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;Interactive SSH sessions, concurrent, per-user secrets&lt;/li&gt;
          &lt;li&gt;User-provided Docker images; training templates&lt;/li&gt;
          &lt;li&gt;Wrote the OSSCI ops design doc&lt;/li&gt;
        &lt;/ul&gt;
        &lt;span class=&quot;pr&quot;&gt;nod-ai/ossci-fleet (12 PRs)&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;AMD GPU CI&lt;/span&gt;
        &lt;h3&gt;AMD CI for SGLang &amp;amp; PyTorch&lt;/h3&gt;
        &lt;p&gt;Owns the AMD/ROCm CI for an LLM-serving stack and tests GPU capacity for PyTorch.&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;SGLang: ROCm images, docker caching, AITER backend, accuracy tests&lt;/li&gt;
          &lt;li&gt;PyTorch: stress-test MI300 / MI325 capacity, gfx942 runner distribution&lt;/li&gt;
        &lt;/ul&gt;
        &lt;span class=&quot;pr&quot;&gt;sglang (47) · pytorch (20)&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;span class=&quot;tag&quot;&gt;Fleet health &amp;amp; sharing&lt;/span&gt;
        &lt;h3&gt;Metrics &amp;amp; GPU fractionalization&lt;/h3&gt;
        &lt;p&gt;Node health signals and squeezing more workloads per GPU.&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;span class=&quot;mono&quot;&gt;device-metrics-exporter&lt;/span&gt; — AMD GPU metrics → Prometheus&lt;/li&gt;
          &lt;li&gt;&lt;span class=&quot;mono&quot;&gt;tensor-fusion&lt;/span&gt; / &lt;span class=&quot;mono&quot;&gt;hipflex&lt;/span&gt; — GPU fractionalization (added AMD support)&lt;/li&gt;
          &lt;li&gt;&lt;span class=&quot;mono&quot;&gt;gpu-test-cluster&lt;/span&gt; — MI300 cluster testing&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 03 WHY JD --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;03&lt;/span&gt;&lt;h2&gt;Why he&#x27;s the JD match — read this&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;dd&quot;&gt;
      &lt;div class=&quot;dd-head&quot;&gt;&lt;h3&gt;The job description is his résumé&lt;/h3&gt;&lt;span class=&quot;prs&quot;&gt;map&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;dd-body&quot;&gt;
        &lt;p&gt;&lt;b&gt;JD: &quot;provision self-hosted GitHub Actions runners that handle real constraints.&quot;&lt;/b&gt; → He set up &lt;b&gt;ARC on Kubernetes&lt;/b&gt;, Linux + Windows, dind-as-sidecar.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;JD: &quot;moving toward AWS-hosted runners (EC2, IAM, networking).&quot;&lt;/b&gt; → He did the same pattern on &lt;b&gt;Azure (AKS)&lt;/b&gt;; the concepts port directly to EKS.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;JD: &quot;hardware-in-the-loop testing&quot; and &quot;multiple GPU products.&quot;&lt;/b&gt; → He &lt;b&gt;stress-tests MI300/MI325 capacity&lt;/b&gt; and runs framework tests on real AMD cards.&lt;/p&gt;
        &lt;p&gt;&lt;b&gt;JD: &quot;shift-left, trunk-health, open-source aligned.&quot;&lt;/b&gt; → His whole footprint is open-source ML CI (SGLang, PyTorch, IREE).&lt;/p&gt;
        &lt;div class=&quot;pull&quot;&gt;&lt;b&gt;What this means for you:&lt;/b&gt; Sai will go &lt;b&gt;deepest on the exact areas your prep was thinnest&lt;/b&gt; — Kubernetes runners, ARC scaling, docker-in-docker, GPU-cluster multi-tenancy, and real-hardware capacity. The answers in §06 are aimed right there.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 04 STYLE --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;04&lt;/span&gt;&lt;h2&gt;Working style&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;rows&quot;&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;A&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Infra-under-the-runners.&lt;/b&gt; &lt;span&gt;Kubernetes, containers, GPU clusters, metrics — the layer beneath the CI workflows.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;platform&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;B&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;ML-framework enablement.&lt;/b&gt; &lt;span&gt;Makes AMD GPUs work in PyTorch, SGLang, IREE — where the customer workloads actually run.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;ML&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;C&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Hardware-real.&lt;/b&gt; &lt;span&gt;Stress-tests MI300/MI325 capacity, exports device metrics, tests real clusters — not just simulated CI.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;hardware&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;rk&quot;&gt;D&lt;/span&gt;&lt;span class=&quot;rt&quot;&gt;&lt;b&gt;Docs &amp;amp; design first.&lt;/b&gt; &lt;span&gt;Writes ops design docs, setup guides, interactive-session instructions — brings order to new infra.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;rc&quot;&gt;rigor&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 05 QUESTIONS TO ASK HIM --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;05&lt;/span&gt;&lt;h2&gt;Questions to ask him&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;qa&quot;&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;1&lt;/span&gt;&lt;span&gt;How does ARC scale runner pods, and how do you handle GPUs in that model?&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;2&lt;/span&gt;&lt;span&gt;You built interactive GPU sessions on OSSCI — how do you keep a shared MI300 cluster multi-tenant and clean?&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;3&lt;/span&gt;&lt;span&gt;What&#x27;s hardest about AMD GPU CI for PyTorch / SGLang — ROCm image sync, docker caching, or capacity?&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;4&lt;/span&gt;&lt;span&gt;You set ARC up on AKS — moving to AWS/EKS, what actually changes?&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 06 WHAT HE ASKS YOU + ANSWERS --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;06&lt;/span&gt;&lt;h2&gt;What &lt;em&gt;he&lt;/em&gt; will ask you — with answers&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;His turf is &lt;strong&gt;Kubernetes runners, GPU clusters, and ML-framework CI&lt;/strong&gt;. Plain answers you can say back:&lt;/p&gt;
    &lt;div class=&quot;qa&quot;&gt;
      &lt;div class=&quot;item&quot;&gt;
        &lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q1&lt;/span&gt;&lt;span&gt;How would you run self-hosted GitHub Actions runners on Kubernetes?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Use the Actions Runner Controller (ARC).&lt;/span&gt; It runs inside the cluster and watches your GitHub job queue. When a job is dispatched, it creates an &lt;b&gt;ephemeral runner pod&lt;/b&gt; that runs exactly one job and is then thrown away. You define a runner scale set — the image, the resources including GPUs, and min/max pods — and ARC scales it up and down with demand. Ephemeral pods mean every job starts on a clean machine, no leftover state.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;
        &lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q2&lt;/span&gt;&lt;span&gt;Runners need to build containers. How do you do docker-in-docker safely?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Run the Docker daemon as a separate sidecar container in the pod.&lt;/span&gt; Don&#x27;t nest Docker inside the runner container itself — put the daemon in its own sidecar. That keeps the build&#x27;s Docker separate from the job process, and you can give the sidecar just the privileges it needs instead of making the whole runner privileged. It&#x27;s easier to reason about and lock down. &lt;span class=&quot;mono&quot;&gt;(This is exactly a change he made — say it plainly.)&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;
        &lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q3&lt;/span&gt;&lt;span&gt;How do you let many engineers share a GPU cluster without stepping on each other?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Give each person an isolated, interactive session.&lt;/span&gt; Their own namespace or pod with a set of GPUs, SSH access, and their own Docker image if they want one. Templates make it repeatable and per-user secrets keep access scoped. When a session ends, clean it up so the GPUs go back to the pool. The goal: an engineer gets a real GPU box in seconds but can&#x27;t touch anyone else&#x27;s.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;
        &lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q4&lt;/span&gt;&lt;span&gt;How do you validate PyTorch or an LLM-serving stack on AMD GPUs in CI?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Build a ROCm image, run the real suite on real cards, gate on accuracy and performance.&lt;/span&gt; The recurring problems are keeping the ROCm image version in sync, docker-layer caching so builds don&#x27;t take forever, and telling a real regression apart from a capacity or flaky-hardware issue. Smoke tests on PRs plus a full nightly run keeps it affordable without losing coverage.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;
        &lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q5&lt;/span&gt;&lt;span&gt;How do you know you have enough GPU runner capacity, and how do you scale it?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Watch the job queue, scale with demand, and stress-test new capacity first.&lt;/span&gt; If jobs wait too long, you&#x27;re short. I scale the runner pool with demand (ARC does this) up to the hardware you actually have — and before relying on a new pool, I run load through it to see it hold up. And I export GPU metrics so I can see utilization and catch a sick node before it fails jobs.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;item&quot;&gt;
        &lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;mk&quot;&gt;Q6&lt;/span&gt;&lt;span&gt;How do you know a GPU node is healthy?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;lead-in&quot;&gt;Export device metrics and pull bad nodes automatically.&lt;/span&gt; Send temperature, memory, utilization, and ECC errors from the AMD GPUs to something like Prometheus, and alert on the bad signals. A node that&#x27;s throttling or throwing ECC errors should be taken out of the pool before it fails someone&#x27;s job and looks like a flaky test.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- 07 FIT --&gt;
  &lt;section&gt;
    &lt;div class=&quot;sec-head&quot;&gt;&lt;span class=&quot;idx&quot;&gt;07&lt;/span&gt;&lt;h2&gt;Fit assessment&lt;/h2&gt;&lt;/div&gt;
    &lt;div class=&quot;fit&quot;&gt;
      &lt;div class=&quot;col str&quot;&gt;
        &lt;h3&gt;Strengths (evidenced)&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;b&gt;ARC self-hosted runners on Kubernetes&lt;/b&gt; — the JD&#x27;s #1 priority, done on AKS.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;GPU cluster ops&lt;/b&gt; — multi-tenant interactive access, health metrics, MI300/MI325 capacity.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;ML-framework GPU CI&lt;/b&gt; — PyTorch, SGLang, IREE on ROCm.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Containers &amp;amp; caching&lt;/b&gt; — dind sidecars, docker caching, ROCm images.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Prolific&lt;/b&gt; — 337 PRs / 312 reviews across the ecosystem.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;col gap&quot;&gt;
        &lt;h3&gt;Different lens (not gaps — just his angle)&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;b&gt;Not a TheRock/GitHub-Actions-workflow specialist&lt;/b&gt; — that&#x27;s Joseph &amp;amp; Geo. Sai is the layer &lt;em&gt;below&lt;/em&gt;.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Azure, not AWS (yet)&lt;/b&gt; — his ARC work is AKS; the JD is AWS-bound. Concepts port, but he&#x27;ll be curious how you&#x27;d do EKS.&lt;/li&gt;
          &lt;li&gt;&lt;b&gt;Firmware/kernel signing&lt;/b&gt; — his world is ML/GPU CI, less the firmware-signing pipeline. That side skews to the AMD article&#x27;s topics.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;footer&gt;
    &lt;b&gt;Methodology.&lt;/b&gt; Compiled from the GitHub API — PR authorship, reviews, and repository activity for &lt;span class=&quot;mono&quot;&gt;saienduri&lt;/span&gt; (Sai Enduri, &lt;span class=&quot;mono&quot;&gt;saimanas.enduri@amd.com&lt;/span&gt;) across ROCm, nod-ai, iree-org, sgl-project, pytorch, and personal repos. He has only 2 PRs in ROCm/TheRock; his footprint is ecosystem-wide. Figures current as of the analysis date.&lt;br&gt;

&lt;div class=&quot;wrap&quot;&gt;
  &lt;header class=&quot;hero&quot;&gt;
    &lt;p class=&quot;eyebrow&quot;&gt;Technical Prep · AMD CI Infrastructure role&lt;/p&gt;
    &lt;h1&gt;End-to-end workflow, architecture &amp;amp; the questions they&#x27;ll push on&lt;/h1&gt;
    &lt;p class=&quot;lede&quot;&gt;Built from the ROCm/TheRock CI analysis. The diagrams first — the pipeline, the job graph, the conditional flow, and the runner fleet — so the whole system fits in your head. Then the coding and design questions to rehearse, and the pain points each interviewer is most likely to stress.&lt;/p&gt;
  &lt;/header&gt;

  &lt;section class=&quot;pdiv&quot;&gt;&lt;div class=&quot;pk&quot;&gt;Part I&lt;/div&gt;&lt;h2&gt;Understand the system&lt;/h2&gt;&lt;p&gt;How the CI fits together — from a PR to a shipped, validated GPU-stack release.&lt;/p&gt;&lt;/section&gt;

  &lt;section&gt;
    &lt;div class=&quot;shead&quot;&gt;&lt;span class=&quot;sn&quot;&gt;01&lt;/span&gt;&lt;h2&gt;End-to-end CI workflow&lt;/h2&gt;&lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;One PR (or one nightly) travels through these stages. Key ideas: &lt;b&gt;the matrix is generated by code, not written in YAML&lt;/b&gt;; &lt;b&gt;build once, test many&lt;/b&gt;; &lt;b&gt;only a full pass promotes the Last Known Good&lt;/b&gt;.&lt;/p&gt;
    &lt;div class=&quot;diagram&quot;&gt;
      &lt;div class=&quot;cap&quot;&gt;// pipeline · trigger → release&lt;/div&gt;
      &lt;div class=&quot;flow&quot;&gt;
        &lt;div class=&quot;stage&quot;&gt;&lt;span class=&quot;st-n&quot;&gt;01 · TRIGGER&lt;/span&gt;&lt;span class=&quot;st-t&quot;&gt;Event&lt;/span&gt;&lt;span class=&quot;st-d&quot;&gt;push · pull_request · nightly schedule · manual dispatch&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;arr&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;stage&quot;&gt;&lt;span class=&quot;st-n&quot;&gt;02 · CONFIGURE&lt;/span&gt;&lt;span class=&quot;st-t&quot;&gt;Generate matrix&lt;/span&gt;&lt;span class=&quot;st-d&quot;&gt;Python builds GPU×OS×py×artifact → JSON via &lt;code&gt;fromJSON()&lt;/code&gt;&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;arr&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;stage&quot;&gt;&lt;span class=&quot;st-n&quot;&gt;03 · BUILD&lt;/span&gt;&lt;span class=&quot;st-t&quot;&gt;Per-target lanes&lt;/span&gt;&lt;span class=&quot;st-d&quot;&gt;CMake superbuild · &lt;code&gt;ccache&lt;/code&gt;→remote cache · self-hosted runners (NFS + signing)&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;arr&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;stage&quot;&gt;&lt;span class=&quot;st-n&quot;&gt;04 · PACKAGE&lt;/span&gt;&lt;span class=&quot;st-t&quot;&gt;Build once&lt;/span&gt;&lt;span class=&quot;st-d&quot;&gt;output → named artifact → object store (S3)&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;arr&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;stage&quot;&gt;&lt;span class=&quot;st-n&quot;&gt;05 · TEST&lt;/span&gt;&lt;span class=&quot;st-t&quot;&gt;On real GPUs&lt;/span&gt;&lt;span class=&quot;st-d&quot;&gt;artifact → hardware runners (MI300/MI325, labeled) · smoke on PR / full nightly&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;arr&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;stage&quot;&gt;&lt;span class=&quot;st-n&quot;&gt;06 · REPORT&lt;/span&gt;&lt;span class=&quot;st-t&quot;&gt;Aggregate &amp;amp; gate&lt;/span&gt;&lt;span class=&quot;st-d&quot;&gt;results collected · retries triage flaky vs real · PR status&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;arr&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;stage&quot;&gt;&lt;span class=&quot;st-n&quot;&gt;07 · LKG&lt;/span&gt;&lt;span class=&quot;st-t&quot;&gt;Promote (nightly)&lt;/span&gt;&lt;span class=&quot;st-d&quot;&gt;all pass → write fw+driver+ROCm versions to the LKG manifest&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;arr&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;stage&quot;&gt;&lt;span class=&quot;st-n&quot;&gt;08 · RELEASE&lt;/span&gt;&lt;span class=&quot;st-t&quot;&gt;Ship recipe&lt;/span&gt;&lt;span class=&quot;st-d&quot;&gt;validated, customer-ready GPU-stack bundle&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;loopnote&quot;&gt;&lt;b&gt;↺ trunk-health loop:&lt;/b&gt; a failed build/test blocks the PR (shift-left); a failed nightly keeps LKG on yesterday&#x27;s good set — it never points at a broken combination.&lt;/div&gt;
